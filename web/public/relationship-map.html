<!-- VIZ-META {"title":"Relationship Map","description":"Force-directed entity graph of NPCs, locations, and threads","category":"visualization"} -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ceremony — Relationship Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="/the-ceremony/js/ceremony-data.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e17;
    color: #e8dcc8;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  header {
    background: #0d1220;
    border-bottom: 1px solid #1e2d44;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    z-index: 10;
    position: relative;
  }

  header h1 {
    font-family: 'Crimson Text', serif;
    font-size: 22px;
    font-weight: 600;
    color: #c4a35a;
    letter-spacing: 1px;
  }

  header h1 span {
    color: #6a6a7a;
    font-weight: 400;
    font-size: 16px;
    margin-left: 12px;
  }

  #controls {
    background: #0d1220;
    border-bottom: 1px solid #1e2d44;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    z-index: 10;
    position: relative;
  }

  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #4a5568;
    margin-right: 4px;
  }

  .cat-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid #1e2d44;
    background: #131a2b;
    color: #e8dcc8;
    transition: all 0.2s;
    user-select: none;
  }

  .cat-chip.hidden {
    opacity: 0.35;
    border-color: transparent;
  }

  .cat-chip .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .edge-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid #1e2d44;
    background: #131a2b;
    color: #e8dcc8;
    transition: all 0.2s;
    user-select: none;
  }

  .edge-chip.hidden {
    opacity: 0.35;
    border-color: transparent;
  }

  .edge-chip .line-sample {
    width: 16px;
    height: 2px;
    display: inline-block;
  }

  .separator {
    width: 1px;
    height: 24px;
    background: #1e2d44;
    flex-shrink: 0;
  }

  #search-box {
    background: #131a2b;
    border: 1px solid #1e2d44;
    border-radius: 6px;
    padding: 6px 12px;
    color: #e8dcc8;
    font-family: inherit;
    font-size: 12px;
    width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search-box:focus {
    border-color: #c4a35a;
  }

  #search-box::placeholder {
    color: #4a5568;
  }

  #reset-btn {
    background: transparent;
    border: 1px solid #1e2d44;
    border-radius: 6px;
    padding: 6px 12px;
    color: #6a7a8a;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  #reset-btn:hover {
    color: #e8dcc8;
    border-color: #c4a35a;
  }

  .stats {
    margin-left: auto;
    font-size: 11px;
    color: #4a5568;
  }

  #main {
    display: flex;
    height: calc(100vh - 56px - 46px);
    position: relative;
  }

  #graph-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #graph {
    width: 100%;
    height: 100%;
  }

  .link {
    fill: none;
    stroke-opacity: 0.25;
    transition: stroke-opacity 0.2s;
  }

  .link.highlighted {
    stroke-opacity: 0.85;
  }

  .link.dimmed {
    stroke-opacity: 0.04;
  }

  .link.dashed {
    stroke-dasharray: 8 5;
  }

  .link.dotted {
    stroke-dasharray: 3 4;
  }

  .node-circle {
    stroke-width: 1.5;
    cursor: pointer;
    transition: stroke-width 0.15s, opacity 0.2s;
  }

  .node-circle.selected {
    stroke-width: 3;
    stroke: #c4a35a !important;
  }

  .node-circle.dimmed {
    opacity: 0.08;
  }

  .node-label {
    fill: #e8dcc8;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: central;
    opacity: 0.85;
  }

  .node-label.dimmed {
    opacity: 0.06;
  }

  .tooltip {
    position: absolute;
    background: #1a2236;
    border: 1px solid #2a3a54;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    z-index: 100;
    max-width: 340px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .tooltip.visible { opacity: 1; }

  .tt-name {
    font-weight: 500;
    color: #c4a35a;
    margin-bottom: 4px;
  }

  .tt-cat {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 6px;
  }

  .tt-desc {
    color: #a8b8c8;
    font-size: 11px;
    margin-top: 4px;
    line-height: 1.4;
  }

  .tt-connections {
    color: #6a7a8a;
    font-size: 11px;
    margin-top: 6px;
  }

  /* Sidebar */
  #sidebar {
    width: 340px;
    background: #0d1220;
    border-left: 1px solid #1e2d44;
    overflow-y: auto;
    padding: 0;
    transition: transform 0.3s;
    flex-shrink: 0;
  }

  .sidebar-empty {
    padding: 32px 20px;
    color: #4a5568;
    font-size: 12px;
    text-align: center;
    line-height: 1.6;
  }

  .sidebar-content {
    padding: 20px;
  }

  .sb-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .sb-name {
    font-size: 16px;
    font-weight: 500;
    color: #e8dcc8;
    word-break: break-word;
  }

  .sb-close {
    background: transparent;
    border: none;
    color: #4a5568;
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
    line-height: 1;
  }

  .sb-close:hover { color: #e8dcc8; }

  .sb-badge {
    display: inline-block;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .sb-section {
    margin-bottom: 16px;
  }

  .sb-section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #4a5568;
    margin-bottom: 8px;
  }

  .sb-desc {
    font-size: 12px;
    color: #a8b8c8;
    line-height: 1.5;
  }

  .sb-conn-list {
    list-style: none;
  }

  .sb-conn-list li {
    padding: 5px 0;
    font-size: 12px;
    color: #a8b8c8;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    border-radius: 4px;
    padding-left: 4px;
    transition: background 0.15s;
  }

  .sb-conn-list li:hover {
    background: #131a2b;
  }

  .sb-conn-type {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .sb-thread-status {
    font-size: 10px;
    color: #6a7a8a;
    margin-top: 2px;
  }

  /* Legend overlay */
  #legend {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(13, 18, 32, 0.92);
    border: 1px solid #1e2d44;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 11px;
    z-index: 5;
    pointer-events: none;
  }

  #legend h3 {
    font-family: 'Crimson Text', serif;
    font-size: 13px;
    color: #c4a35a;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    color: #6a7a8a;
  }

  .legend-line {
    width: 24px;
    height: 2px;
    flex-shrink: 0;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="loading" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;color:#5a6a7a;letter-spacing:0.15em;text-transform:uppercase;z-index:100">Loading story data...</div>
<div id="update-badge" style="position:fixed;top:12px;right:12px;padding:4px 12px;background:#1e2d44;border:1px solid #c4a35a44;border-radius:4px;font-size:10px;color:#c4a35a;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100">Data updated</div>

<header>
  <h1>The Ceremony <span>Force-directed entity graph</span></h1>
  <span class="stats" id="stats"></span>
</header>

<div id="controls">
  <div class="filter-group">
    <span class="filter-label">Nodes</span>
    <div id="node-filters"></div>
  </div>
  <div class="separator"></div>
  <div class="filter-group">
    <span class="filter-label">Edges</span>
    <div id="edge-filters"></div>
  </div>
  <div class="separator"></div>
  <input type="text" id="search-box" placeholder="Search entities...">
  <button id="reset-btn">Reset</button>
</div>

<div id="main">
  <div id="graph-container">
    <svg id="graph"></svg>
    <div class="tooltip" id="tooltip"></div>
    <div id="legend">
      <h3>Edge Types</h3>
      <div class="legend-row"><div class="legend-line" style="background:#c4a35a"></div> Bond</div>
      <div class="legend-row"><div class="legend-line" style="background:#c45a5a; border-top: 2px dashed #c45a5a; height:0"></div> Tension</div>
      <div class="legend-row"><div class="legend-line" style="background:#6a7a8a"></div> Presence</div>
      <div class="legend-row"><div class="legend-line" style="background:#8b7bb5; height:1px"></div> Thread Link</div>
      <div class="legend-row"><div class="legend-line" style="background:#5a6a7a; border-top: 2px dotted #5a6a7a; height:0"></div> Secret</div>
    </div>
  </div>
  <div id="sidebar">
    <div class="sidebar-empty">
      Click a node to inspect its<br>connections and details.<br><br>
      <span style="color:#2a3a54">Drag nodes to rearrange.</span><br>
      <span style="color:#2a3a54">Scroll to zoom. Click background to reset.</span>
    </div>
  </div>
</div>

<script>
// ---- DATA -----------------------------------------------------------

var NODE_TYPES = {
  player:  { label: 'Player Characters', color: '#c4a35a', radius: 20 },
  npc:     { label: 'NPCs',              color: '#6b9e7a', radius: 16 },
  location:{ label: 'Locations',         color: '#7ba4c7', radius: 14 },
  thread:  { label: 'Narrative Threads', color: '#8b7bb5', radius: 10 }
};

var EDGE_TYPES = {
  bond:       { label: 'Bond',        color: '#c4a35a', width: 2.2, dash: null },
  tension:    { label: 'Tension',     color: '#c45a5a', width: 2,   dash: '8 5' },
  presence:   { label: 'Presence',    color: '#6a7a8a', width: 1.4, dash: null },
  secret:     { label: 'Secret',      color: '#5a6a7a', width: 1.4, dash: '3 4' },
  'thread-link': { label: 'Thread Link', color: '#8b7bb5', width: 1, dash: null }
};

var nodes = [];
var edges = [];

var simulation;

CeremonyData.load({ slice: 'relationships' }).then(function(graph) {
  // Map API nodes to our format
  nodes = graph.nodes.map(function(n) {
    var cfg = NODE_TYPES[n.type] || NODE_TYPES.npc;
    return {
      id: n.id, name: n.name, type: n.type, desc: n.desc,
      role: n.role || '', status: n.status || '',
      radius: cfg.radius
    };
  });

  edges = graph.edges.map(function(e) {
    return { source: e.source, target: e.target, type: e.type, desc: e.desc };
  });

  // Filter edges referencing missing nodes
  var nodeIds = new Set(nodes.map(function(n) { return n.id; }));
  edges = edges.filter(function(e) {
    return nodeIds.has(e.source) && nodeIds.has(e.target);
  });

  document.getElementById('loading').style.display = 'none';

  // ---- BUILD THE VISUALIZATION ----------------------------------------

  var svgEl = d3.select('#graph');
  var container = document.getElementById('graph-container');
  var tooltip = document.getElementById('tooltip');
  var sidebar = document.getElementById('sidebar');
  var searchBox = document.getElementById('search-box');
  var statsEl = document.getElementById('stats');

  var selectedNode = null;
  var visibleNodeTypes = {};
  var visibleEdgeTypes = {};
  Object.keys(NODE_TYPES).forEach(function(k) { visibleNodeTypes[k] = true; });
  Object.keys(EDGE_TYPES).forEach(function(k) { visibleEdgeTypes[k] = true; });

  function getNodeById(id) {
    for (var i = 0; i < nodes.length; i++) {
      if (nodes[i].id === id) return nodes[i];
    }
    return null;
  }

  function getSourceId(e) { return typeof e.source === 'object' ? e.source.id : e.source; }
  function getTargetId(e) { return typeof e.target === 'object' ? e.target.id : e.target; }
  function getSourceType(e) { return typeof e.source === 'object' ? e.source.type : getNodeById(e.source).type; }
  function getTargetType(e) { return typeof e.target === 'object' ? e.target.type : getNodeById(e.target).type; }

  // Clone data for D3 mutation
  var graphNodes = nodes.map(function(d) { return Object.assign({}, d); });
  var graphEdges = edges.map(function(d) { return Object.assign({}, d); });

  function updateStats() {
    var vn = 0, ve = 0;
    graphNodes.forEach(function(n) { if (visibleNodeTypes[n.type]) vn++; });
    graphEdges.forEach(function(e) {
      var st = getSourceType(e), tt = getTargetType(e);
      if (visibleEdgeTypes[e.type] && visibleNodeTypes[st] && visibleNodeTypes[tt]) ve++;
    });
    statsEl.textContent = vn + ' nodes / ' + ve + ' edges';
  }

  // ---- FILTERS ---------------------------------------------------------

  var nodeFiltersEl = document.getElementById('node-filters');
  Object.keys(NODE_TYPES).forEach(function(key) {
    var cfg = NODE_TYPES[key];
    var chip = document.createElement('div');
    chip.className = 'cat-chip';
    chip.setAttribute('data-type', key);
    var dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.background = cfg.color;
    chip.appendChild(dot);
    chip.appendChild(document.createTextNode(cfg.label));
    chip.addEventListener('click', function() {
      if (visibleNodeTypes[key]) {
        visibleNodeTypes[key] = false;
        chip.classList.add('hidden');
      } else {
        visibleNodeTypes[key] = true;
        chip.classList.remove('hidden');
      }
      applyFilters();
    });
    nodeFiltersEl.appendChild(chip);
  });

  var edgeFiltersEl = document.getElementById('edge-filters');
  Object.keys(EDGE_TYPES).forEach(function(key) {
    var cfg = EDGE_TYPES[key];
    var chip = document.createElement('div');
    chip.className = 'edge-chip';
    chip.setAttribute('data-type', key);
    var sample = document.createElement('span');
    sample.className = 'line-sample';
    if (cfg.dash && cfg.dash.indexOf('3') >= 0) {
      sample.style.borderTop = '2px dotted ' + cfg.color;
      sample.style.height = '0';
    } else if (cfg.dash) {
      sample.style.borderTop = '2px dashed ' + cfg.color;
      sample.style.height = '0';
    } else {
      sample.style.background = cfg.color;
    }
    chip.appendChild(sample);
    chip.appendChild(document.createTextNode(cfg.label));
    chip.addEventListener('click', function() {
      if (visibleEdgeTypes[key]) {
        visibleEdgeTypes[key] = false;
        chip.classList.add('hidden');
      } else {
        visibleEdgeTypes[key] = true;
        chip.classList.remove('hidden');
      }
      applyFilters();
    });
    edgeFiltersEl.appendChild(chip);
  });

  function applyFilters() {
    nodeG.style('display', function(d) { return visibleNodeTypes[d.type] ? null : 'none'; });
    linkG.style('display', function(d) {
      var st = getSourceType(d), tt = getTargetType(d);
      return visibleEdgeTypes[d.type] && visibleNodeTypes[st] && visibleNodeTypes[tt] ? null : 'none';
    });
    updateStats();
  }

  // ---- SEARCH ----------------------------------------------------------

  searchBox.addEventListener('input', function() {
    var q = searchBox.value.toLowerCase().trim();
    if (!q) {
      clearHighlight();
      return;
    }
    var matches = {};
    graphNodes.forEach(function(n) {
      if (n.name.toLowerCase().indexOf(q) >= 0 || n.id.toLowerCase().indexOf(q) >= 0) {
        matches[n.id] = true;
      }
    });
    if (Object.keys(matches).length === 0) {
      clearHighlight();
      return;
    }
    var neighbors = {};
    Object.keys(matches).forEach(function(k) { neighbors[k] = true; });
    graphEdges.forEach(function(e) {
      var sid = getSourceId(e), tid = getTargetId(e);
      if (matches[sid]) neighbors[tid] = true;
      if (matches[tid]) neighbors[sid] = true;
    });

    nodeG.select('.node-circle')
      .classed('dimmed', function(d) { return !neighbors[d.id]; })
      .classed('selected', function(d) { return !!matches[d.id]; });
    nodeG.selectAll('.node-label')
      .classed('dimmed', function(d) { return !neighbors[d.id]; });
    linkG
      .classed('highlighted', function(d) {
        return !!matches[getSourceId(d)] || !!matches[getTargetId(d)];
      })
      .classed('dimmed', function(d) {
        return !matches[getSourceId(d)] && !matches[getTargetId(d)];
      });
  });

  // ---- RESET -----------------------------------------------------------

  document.getElementById('reset-btn').addEventListener('click', function() {
    searchBox.value = '';
    selectedNode = null;
    clearHighlight();
    closeSidebar();
    Object.keys(NODE_TYPES).forEach(function(k) { visibleNodeTypes[k] = true; });
    Object.keys(EDGE_TYPES).forEach(function(k) { visibleEdgeTypes[k] = true; });
    document.querySelectorAll('.cat-chip, .edge-chip').forEach(function(c) { c.classList.remove('hidden'); });
    applyFilters();
  });

  // ---- SVG SETUP -------------------------------------------------------

  var width = container.clientWidth;
  var height = container.clientHeight;

  svgEl.attr('viewBox', [0, 0, width, height]);

  var g = svgEl.append('g');

  var zoom = d3.zoom()
    .scaleExtent([0.15, 5])
    .on('zoom', function(e) { g.attr('transform', e.transform); });

  svgEl.call(zoom);

  svgEl.on('click', function(e) {
    if (e.target === svgEl.node()) {
      selectedNode = null;
      clearHighlight();
      closeSidebar();
    }
  });

  // ---- FORCE SIMULATION ------------------------------------------------

  simulation = d3.forceSimulation(graphNodes)
    .force('link', d3.forceLink(graphEdges).id(function(d) { return d.id; })
      .distance(function(d) {
        if (d.type === 'presence') return 100;
        if (d.type === 'bond') return 120;
        if (d.type === 'tension') return 150;
        if (d.type === 'secret') return 140;
        if (d.type === 'thread-link') return 110;
        return 120;
      })
      .strength(function(d) {
        if (d.type === 'presence') return 0.3;
        if (d.type === 'thread-link') return 0.15;
        return 0.2;
      })
    )
    .force('charge', d3.forceManyBody()
      .strength(function(d) {
        if (d.type === 'thread') return -150;
        if (d.type === 'location') return -250;
        return -350;
      })
    )
    .force('center', d3.forceCenter(width / 2, height / 2).strength(0.05))
    .force('collision', d3.forceCollide().radius(function(d) { return NODE_TYPES[d.type].radius + 8; }))
    .force('x', d3.forceX(function(d) {
      if (d.type === 'player') return width * 0.35;
      if (d.type === 'npc') return width * 0.25;
      if (d.type === 'location') return width * 0.65;
      if (d.type === 'thread') return width * 0.75;
      return width / 2;
    }).strength(0.04))
    .force('y', d3.forceY(function(d) {
      if (d.type === 'player') return height * 0.35;
      if (d.type === 'npc') return height * 0.55;
      if (d.type === 'location') return height * 0.45;
      if (d.type === 'thread') return height * 0.55;
      return height / 2;
    }).strength(0.04))
    .alphaDecay(0.015);

  // ---- RENDER LINKS ----------------------------------------------------

  var linkG = g.append('g')
    .selectAll('line')
    .data(graphEdges)
    .join('line')
      .attr('class', function(d) {
        var cls = 'link';
        if (d.type === 'tension') cls += ' dashed';
        if (d.type === 'secret') cls += ' dotted';
        return cls;
      })
      .attr('stroke', function(d) { return EDGE_TYPES[d.type].color; })
      .attr('stroke-width', function(d) { return EDGE_TYPES[d.type].width; })
      .attr('stroke-dasharray', function(d) { return EDGE_TYPES[d.type].dash; });

  // ---- RENDER NODES ----------------------------------------------------

  var nodeG = g.append('g')
    .selectAll('g')
    .data(graphNodes)
    .join('g')
      .call(d3.drag()
        .on('start', dragStarted)
        .on('drag', dragged)
        .on('end', dragEnded)
      );

  nodeG.append('circle')
    .attr('class', 'node-circle')
    .attr('r', function(d) { return NODE_TYPES[d.type].radius; })
    .attr('fill', function(d) {
      var c = d3.color(NODE_TYPES[d.type].color);
      c.opacity = 0.15;
      return c;
    })
    .attr('stroke', function(d) { return NODE_TYPES[d.type].color; });

  // Name labels below node
  nodeG.append('text')
    .attr('class', 'node-label')
    .attr('dy', function(d) { return NODE_TYPES[d.type].radius + 14; })
    .text(function(d) {
      var max = d.type === 'thread' ? 16 : 20;
      return d.name.length > max ? d.name.slice(0, max - 1) + '\u2026' : d.name;
    });

  // Inner type letter
  nodeG.append('text')
    .attr('class', 'node-label')
    .attr('font-size', function(d) {
      if (d.type === 'player') return '14px';
      if (d.type === 'npc') return '11px';
      if (d.type === 'location') return '10px';
      return '8px';
    })
    .attr('fill', function(d) { return NODE_TYPES[d.type].color; })
    .attr('opacity', 0.7)
    .text(function(d) {
      if (d.type === 'player') return 'P';
      if (d.type === 'npc') return 'N';
      if (d.type === 'location') return 'L';
      return 'T';
    });

  // ---- HOVER TOOLTIP ---------------------------------------------------

  nodeG.on('mouseenter', function(e, d) {
    var cfg = NODE_TYPES[d.type];
    var connCount = 0;
    graphEdges.forEach(function(ed) {
      if (getSourceId(ed) === d.id || getTargetId(ed) === d.id) connCount++;
    });

    // Build tooltip using DOM methods
    tooltip.textContent = '';
    var nameDiv = document.createElement('div');
    nameDiv.className = 'tt-name';
    nameDiv.textContent = d.name;
    tooltip.appendChild(nameDiv);

    var catDiv = document.createElement('div');
    catDiv.className = 'tt-cat';
    catDiv.style.background = cfg.color + '22';
    catDiv.style.color = cfg.color;
    catDiv.textContent = cfg.label;
    tooltip.appendChild(catDiv);

    if (d.role) {
      var roleDiv = document.createElement('div');
      roleDiv.className = 'tt-desc';
      roleDiv.style.color = cfg.color;
      roleDiv.style.fontStyle = 'italic';
      roleDiv.textContent = d.role;
      tooltip.appendChild(roleDiv);
    }

    if (d.status) {
      var statusDiv = document.createElement('div');
      statusDiv.className = 'tt-desc';
      statusDiv.textContent = 'Status: ' + d.status;
      tooltip.appendChild(statusDiv);
    }

    var descDiv = document.createElement('div');
    descDiv.className = 'tt-desc';
    descDiv.textContent = d.desc;
    tooltip.appendChild(descDiv);

    var connDiv = document.createElement('div');
    connDiv.className = 'tt-connections';
    connDiv.textContent = connCount + ' connection' + (connCount !== 1 ? 's' : '');
    tooltip.appendChild(connDiv);

    tooltip.classList.add('visible');
  })
  .on('mousemove', function(e) {
    var rect = container.getBoundingClientRect();
    var x = e.clientX - rect.left + 16;
    var y = e.clientY - rect.top - 10;
    if (x + 340 > rect.width) x = e.clientX - rect.left - 350;
    if (y + 200 > rect.height) y = rect.height - 210;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  })
  .on('mouseleave', function() {
    tooltip.classList.remove('visible');
  });

  // ---- CLICK TO SELECT -------------------------------------------------

  nodeG.on('click', function(e, d) {
    e.stopPropagation();
    selectedNode = d;
    highlightNode(d);
    openSidebar(d);
  });

  function highlightNode(d) {
    var connectedNodes = {};
    connectedNodes[d.id] = true;
    var connectedEdgeIndices = {};

    graphEdges.forEach(function(e, i) {
      var sid = getSourceId(e), tid = getTargetId(e);
      if (sid === d.id || tid === d.id) {
        connectedNodes[sid] = true;
        connectedNodes[tid] = true;
        connectedEdgeIndices[i] = true;
      }
    });

    nodeG.select('.node-circle')
      .classed('dimmed', function(n) { return !connectedNodes[n.id]; })
      .classed('selected', function(n) { return n.id === d.id; });
    nodeG.selectAll('.node-label')
      .classed('dimmed', function(n) { return !connectedNodes[n.id]; });
    linkG
      .classed('highlighted', function(_, i) { return !!connectedEdgeIndices[i]; })
      .classed('dimmed', function(_, i) { return !connectedEdgeIndices[i]; });
  }

  function clearHighlight() {
    nodeG.select('.node-circle').classed('dimmed', false).classed('selected', false);
    nodeG.selectAll('.node-label').classed('dimmed', false);
    linkG.classed('highlighted', false).classed('dimmed', false);
  }

  // ---- SIDEBAR ---------------------------------------------------------

  var TYPE_COLORS = {
    bond: '#c4a35a', tension: '#c45a5a', presence: '#6a7a8a',
    secret: '#5a6a7a', 'thread-link': '#8b7bb5'
  };

  function openSidebar(d) {
    var cfg = NODE_TYPES[d.type];

    // Gather connections
    var conns = [];
    graphEdges.forEach(function(e) {
      var sid = getSourceId(e), tid = getTargetId(e);
      if (sid === d.id || tid === d.id) {
        var otherId = sid === d.id ? tid : sid;
        var other = graphNodes.find(function(n) { return n.id === otherId; });
        conns.push({ edge: e, other: other });
      }
    });

    // Build sidebar using DOM methods
    sidebar.textContent = '';
    var content = document.createElement('div');
    content.className = 'sidebar-content';

    // Header
    var header = document.createElement('div');
    header.className = 'sb-header';
    var nameEl = document.createElement('div');
    nameEl.className = 'sb-name';
    nameEl.textContent = d.name;
    header.appendChild(nameEl);
    var closeBtn = document.createElement('button');
    closeBtn.className = 'sb-close';
    closeBtn.textContent = '\u00d7';
    closeBtn.addEventListener('click', function() { closeSidebar(); clearHighlight(); });
    header.appendChild(closeBtn);
    content.appendChild(header);

    // Badge
    var badge = document.createElement('div');
    badge.className = 'sb-badge';
    badge.style.background = cfg.color + '22';
    badge.style.color = cfg.color;
    badge.textContent = cfg.label;
    content.appendChild(badge);

    // Role (NPCs)
    if (d.role) {
      var roleSec = document.createElement('div');
      roleSec.className = 'sb-section';
      var roleTitle = document.createElement('div');
      roleTitle.className = 'sb-section-title';
      roleTitle.textContent = 'Role';
      roleSec.appendChild(roleTitle);
      var roleDesc = document.createElement('div');
      roleDesc.className = 'sb-desc';
      roleDesc.textContent = d.role;
      roleSec.appendChild(roleDesc);
      content.appendChild(roleSec);
    }

    // Thread status
    if (d.status) {
      var threadSec = document.createElement('div');
      threadSec.className = 'sb-section';
      var threadTitle = document.createElement('div');
      threadTitle.className = 'sb-section-title';
      threadTitle.textContent = 'Thread Status';
      threadSec.appendChild(threadTitle);
      var threadStatus = document.createElement('div');
      threadStatus.className = 'sb-desc';
      threadStatus.style.color = cfg.color;
      threadStatus.textContent = d.status.toUpperCase();
      threadSec.appendChild(threadStatus);
      if (d.planted) {
        var plantedEl = document.createElement('div');
        plantedEl.className = 'sb-thread-status';
        plantedEl.textContent = 'Planted: ' + d.planted;
        threadSec.appendChild(plantedEl);
      }
      if (d.payoff) {
        var payoffEl = document.createElement('div');
        payoffEl.className = 'sb-thread-status';
        payoffEl.textContent = 'Payoff: ' + d.payoff;
        threadSec.appendChild(payoffEl);
      }
      content.appendChild(threadSec);
    }

    // Description
    var descSec = document.createElement('div');
    descSec.className = 'sb-section';
    var descTitle = document.createElement('div');
    descTitle.className = 'sb-section-title';
    descTitle.textContent = 'Description';
    descSec.appendChild(descTitle);
    var descText = document.createElement('div');
    descText.className = 'sb-desc';
    descText.textContent = d.desc;
    descSec.appendChild(descText);
    content.appendChild(descSec);

    // Connections
    var connSec = document.createElement('div');
    connSec.className = 'sb-section';
    var connTitle = document.createElement('div');
    connTitle.className = 'sb-section-title';
    connTitle.textContent = 'Connections (' + conns.length + ')';
    connSec.appendChild(connTitle);
    var connList = document.createElement('ul');
    connList.className = 'sb-conn-list';
    conns.forEach(function(c) {
      var tc = TYPE_COLORS[c.edge.type] || '#6a7a8a';
      var li = document.createElement('li');
      li.setAttribute('data-node-id', c.other.id);
      var typeSpan = document.createElement('span');
      typeSpan.className = 'sb-conn-type';
      typeSpan.style.background = tc + '22';
      typeSpan.style.color = tc;
      typeSpan.textContent = EDGE_TYPES[c.edge.type].label;
      li.appendChild(typeSpan);
      var nameSpan = document.createElement('span');
      nameSpan.textContent = c.other.name;
      li.appendChild(nameSpan);
      li.addEventListener('click', function() {
        var targetNode = graphNodes.find(function(n) { return n.id === c.other.id; });
        if (targetNode) {
          selectedNode = targetNode;
          highlightNode(targetNode);
          openSidebar(targetNode);
          svgEl.transition().duration(500).call(
            zoom.translateTo, targetNode.x, targetNode.y
          );
        }
      });
      connList.appendChild(li);
    });
    connSec.appendChild(connList);
    content.appendChild(connSec);

    sidebar.appendChild(content);
  }

  function closeSidebar() {
    selectedNode = null;
    sidebar.textContent = '';
    var empty = document.createElement('div');
    empty.className = 'sidebar-empty';
    var line1 = document.createTextNode('Click a node to inspect its');
    empty.appendChild(line1);
    empty.appendChild(document.createElement('br'));
    var line2 = document.createTextNode('connections and details.');
    empty.appendChild(line2);
    empty.appendChild(document.createElement('br'));
    empty.appendChild(document.createElement('br'));
    var hint1 = document.createElement('span');
    hint1.style.color = '#2a3a54';
    hint1.textContent = 'Drag nodes to rearrange.';
    empty.appendChild(hint1);
    empty.appendChild(document.createElement('br'));
    var hint2 = document.createElement('span');
    hint2.style.color = '#2a3a54';
    hint2.textContent = 'Scroll to zoom. Click background to reset.';
    empty.appendChild(hint2);
    sidebar.appendChild(empty);
  }

  // ---- DRAG ------------------------------------------------------------

  function dragStarted(e, d) {
    if (!e.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  }

  function dragged(e, d) {
    d.fx = e.x;
    d.fy = e.y;
  }

  function dragEnded(e, d) {
    if (!e.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  }

  // ---- TICK ------------------------------------------------------------

  simulation.on('tick', function() {
    linkG
      .attr('x1', function(d) { return d.source.x; })
      .attr('y1', function(d) { return d.source.y; })
      .attr('x2', function(d) { return d.target.x; })
      .attr('y2', function(d) { return d.target.y; });

    nodeG.attr('transform', function(d) { return 'translate(' + d.x + ',' + d.y + ')'; });
  });

  // Initial stats
  updateStats();

  // Zoom to fit after layout stabilizes
  setTimeout(function() {
    var pad = 60;
    var x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
    graphNodes.forEach(function(d) {
      var r = NODE_TYPES[d.type].radius;
      if (d.x - r < x0) x0 = d.x - r;
      if (d.y - r < y0) y0 = d.y - r;
      if (d.x + r > x1) x1 = d.x + r;
      if (d.y + r > y1) y1 = d.y + r;
    });
    var bw = x1 - x0 + pad * 2;
    var bh = y1 - y0 + pad * 2;
    var scale = Math.min(width / bw, height / bh, 1.5);
    var cx = (x0 + x1) / 2;
    var cy = (y0 + y1) / 2;
    svgEl.transition().duration(800).call(
      zoom.transform,
      d3.zoomIdentity.translate(width / 2, height / 2).scale(scale).translate(-cx, -cy)
    );
  }, 2500);
});

CeremonyData.subscribe(function(graph) {
  var oldPositions = {};
  nodes.forEach(function(n) {
    oldPositions[n.id] = { x: n.x, y: n.y, vx: n.vx, vy: n.vy };
  });

  nodes = graph.nodes.map(function(n) {
    var cfg = NODE_TYPES[n.type] || NODE_TYPES.npc;
    var pos = oldPositions[n.id] || {};
    return {
      id: n.id, name: n.name, type: n.type, desc: n.desc,
      role: n.role || '', status: n.status || '',
      radius: cfg.radius, x: pos.x, y: pos.y, vx: pos.vx || 0, vy: pos.vy || 0
    };
  });

  edges = graph.edges.map(function(e) {
    return { source: e.source, target: e.target, type: e.type, desc: e.desc };
  });

  var nodeIds = new Set(nodes.map(function(n) { return n.id; }));
  edges = edges.filter(function(e) {
    return nodeIds.has(typeof e.source === 'object' ? e.source.id : e.source)
        && nodeIds.has(typeof e.target === 'object' ? e.target.id : e.target);
  });

  if (typeof simulation !== 'undefined' && simulation) {
    simulation.nodes(nodes);
    simulation.force('link').links(edges);
    simulation.alpha(0.3).restart();
  }

  // Flash update badge
  var badge = document.getElementById('update-badge');
  badge.style.opacity = '1';
  setTimeout(function() { badge.style.opacity = '0'; }, 2000);
});

</script>
</body>
</html>
