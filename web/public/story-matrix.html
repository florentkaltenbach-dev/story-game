ack, what follows them home?'"},{"characterId":"believer-angell","session":4,"act":0,"location":"Plane — mountain crossing","status":"healthy","emotional":"catatonic","knowledge":["pnakotic-fragments","eltdown-shards","necronomicon-marginalia","briefing-document","triangular-markings","lakes-journal","specimen-existence","mountain-scale","elder-thing-murals","billion-year-civilization","warm-air-below","elder-things-were-men","shoggoth-existence"],"narrativeRole":"support","threadsActive":[],"danger":2,"activity":"Barely responsive. Clutches his notebooks. Whispers correlations"},{"characterId":"believer-angell","session":4,"act":1,"location":"Plane — above violet mountains","status":"healthy","emotional":"recognition","knowledge":["pnakotic-fragments","eltdown-shards","necronomicon-marginalia","briefing-document","triangular-markings","lakes-journal","specimen-existence","mountain-scale","elder-thing-murals","billion-year-civilization","warm-air-below","elder-things-were-men","shoggoth-existence","violet-mountains-vision"],"narrativeRole":"lead","threadsActive":["violet-mountains"],"danger":1,"activity":"The vision. He recognizes it. This was in the texts too. All of it was true"},{"characterId":"believer-angell","session":4,"act":2,"location":"McMurdo Sound","status":"healthy","emotional":"fragile","knowledge":["pnakotic-fragments","eltdown-shards","necronomicon-marginalia","briefing-document","triangular-markings","lakes-journal","specimen-existence","mountain-scale","elder-thing-murals","billion-year-civilization","warm-air-below","elder-things-were-men","shoggoth-existence","violet-mountains-vision"],"narrativeRole":"support","threadsActive":[],"danger":1,"activity":"Back among people. Slowly returning to himself. The monograph he'll never publish"},{"characterId":"believer-angell","session":4,"act":3,"location":"McMurdo Sound","status":"healthy","emotional":"resigned","knowledge":["pnakotic-fragments","eltdown-shards","necronomicon-marginalia","briefing-document","triangular-markings","lakes-journal","specimen-existence","mountain-scale","elder-thing-murals","billion-year-civilization","warm-air-below","elder-things-were-men","shoggoth-existence","violet-mountains-vision"],"narrativeRole":"lead","threadsActive":[],"danger":1,"activity":"The Choice. His cousin died trying to warn people. Dyer was ignored. The pattern repeats. Telling or silence — neither changes what's under the ice","mcNote":"The scholar who confirmed the texts must decide if knowledge itself is the threat.","npcBehavior":"'I spent three years proving the Pnakotic manuscripts were real. I succeeded. I wish I hadn't.' Closes the satchel."},{"characterId":"believer-waverly","session":4,"act":0,"location":"Plane — mountain crossing","status":"healthy","emotional":"exhausted","knowledge":["oral-traditions","island-warnings","briefing-document","triangular-markings","lakes-journal","specimen-existence","mountain-scale","elder-thing-murals","billion-year-civilization","warm-air-below","elder-things-were-men","shoggoth-existence"],"narrativeRole":"support","threadsActive":[],"danger":2,"activity":"Tends to injuries. The practical work keeps her grounded"},{"characterId":"believer-waverly","session":4,"act":1,"location":"Plane — above violet mountains","status":"healthy","emotional":"acceptance","knowledge":["oral-traditions","island-warnings","briefing-document","triangular-markings","lakes-journal","specimen-existence","mountain-scale","elder-thing-murals","billion-year-civilization","warm-air-below","elder-things-were-men","shoggoth-existence","violet-mountains-vision"],"narrativeRole":"lead","threadsActive":["violet-mountains"],"danger":1,"activity":"The vision. She prays. Not for deliverance — for understanding"},{"characterId":"believer-waverly","session":4,"act":2,"location":"McMurdo Sound","status":"healthy","emotional":"weary-strong","knowledge":["oral-traditions","island-warnings","briefing-document","triangular-markings","lakes-journal","specimen-existence","mountain-scale","elder-thing-murals","billion-year-civilization","warm-air-below","elder-things-were-men","shoggoth-existence","violet-mountains-vision"],"narrativeRole":"support","threadsActive":[],"danger":1,"activity":"Checks on everyone. Some are broken. Some are numb. All are changed"},{"characterId":"believer-waverly","session":4,"act":3,"location":"McMurdo Sound","status":"healthy","emotional":"clear","knowledge":["oral-traditions","island-warnings","briefing-document","triangular-markings","lakes-journal","specimen-existence","mountain-scale","elder-thing-murals","billion-year-civilization","warm-air-below","elder-things-were-men","shoggoth-existence","violet-mountains-vision"],"narrativeRole":"lead","threadsActive":[],"danger":1,"activity":"The Choice. The warnings survived millennia in human memory. The story must be told — but in a way people can carry. Not science. Story. The oral tradition continues","mcNote":"The warnings she heard were meant to prepare survivors. She is now one of them.","npcBehavior":"'The old stories survive because people chose to remember them. The question is: what do we choose to remember?'"},{"characterId":"patron-starkweather","session":4,"act":0,"location":"Plane — mountain crossing","status":"shaken","emotional":"hollow","knowledge":["dyer-account","briefing-document","triangular-markings","lakes-journal","specimen-existence","mountain-scale","elder-thing-murals","billion-year-civilization","warm-air-below","tunnel-carvings","elder-things-were-men","shoggoth-existence"],"narrativeRole":"support","threadsActive":[],"danger":2,"activity":"Sits in the plane. Stares at nothing. The man who believed everything now believes nothing"},{"characterId":"patron-starkweather","session":4,"act":1,"location":"Plane — above violet mountains","status":"shaken","emotional":"numb","knowledge":["dyer-account","briefing-document","triangular-markings","lakes-journal","specimen-existence","mountain-scale","elder-thing-murals","billion-year-civilization","warm-air-below","tunnel-carvings","elder-things-were-men","shoggoth-existence","violet-mountains-vision"],"narrativeRole":"support","threadsActive":["violet-mountains"],"danger":1,"activity":"The vision above the violet mountains. He doesn't look away. He owes it that much"},{"characterId":"patron-starkweather","session":4,"act":2,"location":"McMurdo Sound","status":"shaken","emotional":"guilt","knowledge":["dyer-account","briefing-document","triangular-markings","lakes-journal","specimen-existence","mountain-scale","elder-thing-murals","billion-year-civilization","warm-air-below","tunnel-carvings","elder-things-were-men","shoggoth-existence","violet-mountains-vision"],"narrativeRole":"support","threadsActive":[],"danger":1,"activity":"The world wants answers. Moore wants data. Starkweather wants to undo what he funded"},{"characterId":"patron-starkweather","session":4,"act":3,"location":"McMurdo Sound","status":"shaken","emotional":"devastated-lucid","knowledge":["dyer-account","briefing-document","triangular-markings","lakes-journal","specimen-existence","mountain-scale","elder-thing-murals","billion-year-civilization","warm-air-below","tunnel-carvings","elder-things-were-men","shoggoth-existence","violet-mountains-vision"],"narrativeRole":"pivot","threadsActive":[],"danger":1,"activity":"The Choice. What he funded exceeds imagination. A third expedition would be his fault too. The True Believer must decide whether belief itself was the mistake","mcNote":"Starkweather's arc resolves here. The man who believed Dyer and funded the proof now holds the weight of that proof. His choice is the patron's choice: fund silence (betray his own belief) or fund truth (risk a third expedition). Either way, he funded something beyond human control. The True Believer's arc: vindication sought → vindication achieved → vindication as horror.","npcBehavior":"Speaks slowly. Makes eye contact for the first time since the tunnels. 'I believed Dyer. I was right to believe him. And I was wrong to come here.' If Price pushes for a report to send to investors, Starkweather looks at him like a stranger."},{"characterId":"patron-moore","session":4,"act":0,"location":"Radio silence — US","status":"healthy","emotional":"absent","knowledge":["dyer-account-redacted","briefing-document","triangular-markings-reported"],"narrativeRole":"absent","threadsActive":[],"danger":2,"activity":"Still no contact. Moore has been trying to reach them for days. His cables to McMurdo go unanswered"},{"characterId":"patron-moore","session":4,"act":1,"location":"Radio silence — US","status":"healthy","emotional":"absent","knowledge":["dyer-account-redacted","briefing-document","triangular-markings-reported"],"narrativeRole":"absent","threadsActive":[],"danger":1,"activity":"The vision above the violet mountains. Moore cannot see it. His empiricism is irrelevant here"},{"characterId":"patron-moore","session":4,"act":2,"location":"Harvard (via radio — restored)","status":"healthy","emotional":"frantic","knowledge":["dyer-account-redacted","briefing-document","triangular-markings-reported"],"narrativeRole":"tension","threadsActive":[],"danger":1,"activity":"Radio restored at McMurdo. Moore's voice floods back — days of unanswered calls compressed into frantic demands. 'What happened? Where have you been? Report!'","mcNote":"Moore's voice returning should feel like re-entry into civilization. He's been in the dark for days and he's furious. But his questions are about data — he doesn't know to ask about the Shoggoth, the Elder Things, the city. The gap between what he knows and what they know is now an abyss."},{"characterId":"patron-moore","session":4,"act":3,"location":"Harvard (via radio — restored)","status":"healthy","emotional":"demanding","knowledge":["dyer-account-redacted","briefing-document","triangular-markings-reported"],"narrativeRole":"tension","threadsActive":[],"danger":1,"activity":"The Choice, from afar. Moore demands the full report. Ainsworth holds the data. The skeptic wants proof — but proof of what they found is proof that a third expedition is warranted. Moore's empiricism becomes the very thing that could send more people to die","mcNote":"Moore's arc resolves in absentia. The skeptic who demanded data will receive data that destroys his skepticism — or be lied to and remain safe in his ignorance. His voice on the radio is the voice of the world that doesn't know yet. Every player must decide: do they tell Moore the truth? His knowledge array never grew because he was never there. The gap between his knowledge and theirs IS the choice.","npcBehavior":"Crisp, professional, relentless on the radio. 'I want Ainsworth's samples catalogued and transmitted. I want Starkweather's account on record. I want geological data, not ghost stories.' If given fragments of truth: long silence, then — 'Say that again. Slowly.' If lied to: 'Good. File the report. We'll debrief when you return.' Either way, he's already planning what comes next."}]};
var STORY_MATRIX_ARCS = {"scientist-pabodie":{"throughline":"An engineer whose faith in instruments and methodology is dismantled by a world that was built without either.","peak":"S2-A0: Drill hits unhewn stone","break":"S3-A0: Tunnels defy geometry","ifPlayer":"Journal entries begin precise — measurements, schematics, margin calculations. The player feels competence as identity: Pabodie knows what he built, knows what it can do. When the drill strikes something it cannot cut, the journal voice stutters. Measurements acquire question marks. Diagrams trail off mid-line. By the tunnels, the player must reckon with the fact that understanding was never the same thing as control. The internal conflict is between the man who fixes things and the man who must accept that some things were never broken — they were built this way, by hands that understood forces his education never named. The player's arc is the grief of mastery made irrelevant.","ifNpc":"Pabodie's hands are his tell. Early on he is always touching something — adjusting a bolt, tapping a pressure gauge, running a thumb along a weld seam. He speaks in specifications and tolerances. After the drill fails, he goes quiet for hours, then talks too fast about recalibration. In the tunnels he stops touching the walls. His dialogue shifts from declarative to interrogative. The MC should portray a man whose body language becomes progressively less certain — a mechanic standing in a cathedral, tools useless in his belt. He does not panic. He simply stops volunteering solutions."},"scientist-bryce":{"throughline":"A biologist who came to classify the impossible discovers that classification is a cage she built around herself.","peak":"S1-A2: Specimen examination","break":"S3-A1: Living biology redefines 'alive'","ifPlayer":"The journal voice is clinical, precise, annotated — the voice of someone who learned early that emotion is unprofessional and wonder is a liability. The player experiences mastery through naming: genus, phylum, cellular structure, metabolic pathway. The specimen examination is exhilarating because the organism is new but still classifiable. The break comes when the biology stops being classifiable at all — when the organism is alive in ways that make the word 'alive' a lie told to children. The player's internal conflict is between the woman who finds safety in taxonomy and the woman who must admit that the categories were always hers, never nature's. Her journal entries should become longer, more desperate in their precision, as though enough Latin nomenclature could hold back the dark.","ifNpc":"Bryce speaks in the clipped cadence of someone defending a thesis she knows is under attack. She corrects terminology — sharply, reflexively, even when no one asked. Her specimen notes are meticulous, and the MC should let other characters see her working late, bent over samples, muttering classifications. After the break, her corrections stop. She stares at slides without writing. When asked what she sees, she says 'I don't have the vocabulary yet,' and the 'yet' is doing all the work. The MC should show her hands shaking — not from fear, but from the effort of not writing down what she actually observes."},"veteran-rourke":{"throughline":"A soldier who survived one hell discovers that survival skills are not transferable between hells.","peak":"S1-A2: Perimeter breached at Lake's camp","break":"S3-A0: Gallipoli flashback in tunnels","ifPlayer":"The journal voice is terse, operational, stripped of adjectives — a soldier's after-action report written for no commanding officer. The player feels competence differently from the scientists: not through understanding, but through readiness. Rourke has seen men die and knows how to stop it. The perimeter breach at Lake's camp is the peak because it is the last time his training maps onto reality — there is a threat, there is a perimeter, there is a response. The break in the tunnels is not fear of the alien. It is the smell of mud, the confined space, the sound of something moving in the dark — and suddenly he is twenty-three and the walls are Gallipoli and the men beside him are already dead. The player's arc is the discovery that trauma does not make you stronger. It makes you breakable in specific, precise ways that you cannot predict and cannot train away.","ifNpc":"Rourke is the quietest person in any room and the first person everyone looks at when something goes wrong. He positions himself near exits. He counts heads without being asked. His dialogue is monosyllabic until danger arrives, at which point he becomes terrifyingly articulate — clear orders, precise distances, no wasted breath. After the tunnels, the MC should show the cracks: a hand that won't stop gripping his rifle strap, eyes that track movement no one else sees, a flinch at sounds that are not gunfire but remind him of gunfire. He never explains. If asked, he says 'I'm fine,' and everyone knows he is lying, and no one pushes."},"journalist-caldwell":{"throughline":"A reporter chasing the story of a lifetime learns that some truths destroy the vessel that carries them.","peak":"S2-A1: Photographs the murals","break":"S3-A2: Drops the camera, doesn't go back","ifPlayer":"The journal is a reporter's notebook — shorthand, observations, overheard quotes, half-formed ledes. The player experiences the world through the lens of narrative: everything is a story, everyone is a source, every moment is either above or below the fold. Photographing the murals is ecstasy — visual proof, physical evidence, the front page made manifest. The break is not a single horror but an accumulation: the moment the player realizes they have stopped composing shots and started simply staring. The camera falls and the player does not go back for it because going back means turning around, and turning around means looking again, and looking again means the story is no longer out there to be reported — it is in here, in the journalist, rewriting her. The internal conflict is between the woman who records and the woman who has become the record.","ifNpc":"Caldwell is always scribbling. She asks the questions no one else will ask, at the moments no one else would choose. She is irritating, persistent, and occasionally brilliant. The MC should show her darting into situations she shouldn't be in, camera raised like a shield. Her dialogue is questions — she deflects personal inquiries by asking three more. After the break, the notebook closes. She stops asking questions. The MC's most powerful tool with NPC Caldwell is silence: the reporter who stops reporting is the loudest alarm the expedition has. If someone asks her what she saw, she says 'I need to think about how to describe it,' and then she never describes it."},"mechanic-gedney":{"throughline":"A man whose identity is his hands discovers a world that was not built by hands.","peak":"S1-A1: Plane engine sounds wrong","break":"S2-A1: Something breaks with no mechanism","ifPlayer":"The journal voice is blunt, physical, full of sensory detail — sounds, textures, temperatures, the specific resistance of a bolt at three-quarter turn. The player experiences mastery through the body: Gedney knows the planes the way a pianist knows a keyboard, by touch and by ear. When the engine sounds wrong, the player enters the peak as a puzzle — diagnosis, troubleshooting, the satisfaction of the competent hand. The break comes when something mechanical fails and there is no mechanical reason. No worn part, no metal fatigue, no ice in the fuel line. It simply stopped. The player's internal conflict is between a man who believes all problems are physical and a man confronting the possibility that some forces do not care about physics. His journal entries become lists — parts checked, tolerances verified, tests run — growing longer and more frantic, a litany against the incomprehensible.","ifNpc":"Gedney is always fixing something. His hands are never still. He talks to machines — not in the cute way, in the way a man talks to the only things that have never let him down. His dialogue with people is simple, direct, slightly awkward; his dialogue about machines is lyrical and precise. After the break, the MC should show him standing in front of an open engine cowling, tools laid out, not touching anything. If another character asks what is wrong, he says 'Nothing. That's the problem. There's nothing wrong with it and it doesn't work.' He returns to base camp and sits with his hands in his lap, and that stillness is the most frightening thing about him."},"mechanic-webb":{"throughline":"A radio operator who defined himself by connection watches every frequency go silent.","peak":"S1-A1: Last clear signal from Moore","break":"S2-A0: Signal from no station","ifPlayer":"The journal voice is precise and auditory — Webb describes the world in terms of signals, frequencies, the quality of static. Silence is the enemy. The player experiences the peak as bittersweet clarity: Moore's voice comes through clean, every word distinct, and the player knows this is the last time the link will be this strong. The journal records the exact time, frequency, signal strength — preserving the moment like a pressed flower. The break comes when a signal arrives from a frequency no station uses, carrying patterns that are not Morse, not voice, not anything Webb has heard in twenty years of listening. The player's internal conflict is between the man who believes connection equals safety and the man who must accept that some connections are not rescue — they are contact, from something that has been listening longer than anyone has been transmitting. Webb's journal becomes a log: frequencies scanned, signals absent, the growing catalogue of silence.","ifNpc":"Webb is the man with the headphones. He is always half-listening to something else, head cocked, one ear free. His dialogue trails off when he hears a frequency shift no one else notices. He reports signal conditions the way a doctor reports vitals: 'Signal strength three, atmospheric noise heavy, Moore's next scheduled contact in four hours.' After the break, the MC should show Webb at the radio set at odd hours, scanning frequencies methodically, writing nothing down. If asked what he is listening for, he says 'I'm not sure it matters. Something is listening for us.' He begins sleeping near the radio. He stops taking off the headphones."},"agent-price":{"throughline":"A man who measures everything in value discovers something that bankrupts the concept.","peak":"S1-A2: Specimens have commercial value","break":"S2-A1: Exceeds any ledger","ifPlayer":"The journal is the second ledger — the one no one has seen. The player experiences Price's mind as a constant valuation engine: every discovery is an asset, every risk is a liability, every person is a resource with a calculable return. The specimens at the peak represent the moment investment becomes justified — here is something worth more than the expedition cost, something Starkweather will weep over with gratitude. The journal entries are sharp, satisfied, the prose of a man who has been right about a bet. The break comes when the scale of what they have found exceeds any framework of ownership. You cannot put a price on something that predates currency, predates civilization, predates the species that invented the concept of price. The player's internal conflict is between the man who controls through accounting and the man who realizes that control was always an illusion maintained by the smallness of what he had previously measured. The ledger stays open. The pen does not move.","ifNpc":"Price is the man in the pressed collar at sixty below. He is always taking notes, always calculating, always watching what others carry and where they put it down. His dialogue is transactional — favours offered, debts noted, costs cited. He makes himself useful through logistics: he knows where everything is, how much it weighs, what it cost. After the break, the MC should show Price standing very still in front of something vast, ledger open, pen poised, writing nothing. His composure does not crack — it empties. He continues to function, but his calculations become circular, his supply reports increasingly irrelevant. He begins giving things away — food, equipment, warm clothing — as though disbursing the assets of a venture that has already been liquidated."},"agent-ainsworth":{"throughline":"A scientist sent to ensure objectivity discovers that objectivity requires a stable observer.","peak":"S1-A2: Geological evidence defies rigor","break":"S3-A1: Reports become confessions","ifPlayer":"The journal is two documents interleaved: the official field report (coded, precise, formatted for Moore's files) and the private observations she cannot send. The player experiences the peak as professional crisis — the geological evidence is real, measurable, reproducible, and it contradicts everything her discipline considers possible. The journal voice remains controlled, but the margin notes begin to diverge from the main text. By the break, the official reports have become confessions. The player must navigate the moment when the observer admits she is no longer separate from what she observes. The internal conflict is between the woman Moore sent — the impartial eye, the clean data — and the woman who has seen too much to pretend that impartiality is possible. Her coded transmissions to Moore grow shorter. Her private journal grows longer. The player must decide which document is the real one.","ifNpc":"Ainsworth is the composed woman with the geological hammer and the codebook. She takes measurements others don't think to take. She asks clarifying questions in a tone that suggests she already knows the answer. Her dialogue is careful, qualified, full of 'the data suggests' and 'pending verification.' The MC should show her coding messages late at night, transmitting on a frequency Price doesn't know about. After the break, the codes stop. She begins writing in plain English. Her reports to Moore — if the radio still works — lose their professional distance. 'James, I need you to understand what I am telling you. This is not a geological formation. I don't know what it is. I don't think I'm the right person to determine that. I don't think there is a right person.' The MC should portray a woman whose competence is fully intact but whose framework for deploying it has collapsed."},"expert-sorensen":{"throughline":"An ice pilot who dismissed the old stories as superstition learns that superstition is what you call knowledge that predates your education.","peak":"S1-A1: Ice groans at wrong frequency","break":"S2-A0: Old stories were true","ifPlayer":"The journal voice is sparse, physical, rooted in the body's knowledge of ice — sounds, pressures, the way a shelf groans before it calves, the smell of open water three miles off. The player experiences the peak as wrongness felt in the bones: the ice is making sounds it should not make, at frequencies that belong to deeper, older pressures than any glacier produces. The journal records these sounds phonetically, haltingly, a man trying to write what his ears know and his vocabulary cannot hold. The break comes when the old sailors' stories — the ones he told at mess to get a laugh, the ones his grandfather told with dead-serious eyes — prove to be accurate descriptions of what lies beneath the deep ice. The player's internal conflict is between the professional who dismissed folklore and the grandson who should have listened. His journal entries shift from technical ice observations to fragments of remembered stories, written down now with the urgency of a man transcribing a language he almost forgot.","ifNpc":"Sorensen is the man who smells the wind and tells you the weather for the next three days. He speaks rarely, and when he does, it is in short declarative sentences that other men learn not to argue with. He smokes a pipe. He watches the ice the way Rourke watches doorways — not casually, but as a professional assessment of threat. The MC should let Sorensen be the expedition's early warning system: he says 'The ice is wrong today' and no one laughs, because the last time he said that, they lost a supply cache. After the break, the MC should show Sorensen doing something he has never done before: sitting down when he should be standing watch, staring south with an expression that is not fear but recognition. If asked what he sees, he tells one of the old stories — but this time, he is not smiling."},"expert-mcready":{"throughline":"A dog handler who trusts animals over people follows them to the threshold of understanding and then past it.","peak":"S2-A0: Dogs refuse to face mountains","break":"S3-A0: He understands why","ifPlayer":"The journal voice is observational, intimate, centered on the dogs — their behavior, their moods, the specific quality of a whine versus a growl, the way a lead dog's ears flatten before a storm. The player experiences the world through animal intermediaries: the dogs know things first, and McReady translates. At the peak, the dogs refuse. Not fear-refuse — they have been afraid before and pushed through. This is something else. They will not face the mountains. They pull against the traces, they dig in, they look at McReady with an expression he has never seen in twenty years of handling. The journal records their behavior with clinical detail and growing dread. The break comes in the tunnels, when McReady stops translating the dogs' fear and begins feeling it himself — not as empathy, but as direct knowledge. He understands why they refused. The player's internal conflict is between the man who trusted instinct over intellect and the man who now possesses an instinct he desperately wishes he could intellectualize away.","ifNpc":"McReady is always with the dogs. He feeds them, checks their paws, sleeps near them. His dialogue with people is gruff and minimal; his dialogue with dogs is a continuous low murmur that other characters find either comforting or unsettling. The MC should use McReady as a barometer: when he is relaxed, the dogs are relaxed, and the scene is safe. When he goes quiet and the dogs go quiet, something is coming. After the break, the MC should show McReady without the dogs — either because they have been left behind or because they will no longer go where the expedition goes. He is diminished without them, a translator without a language. He stands at the edge of the group, watching the direction the dogs would not face, and he does not explain what he knows. If pressed, he says only: 'They were right.'"},"believer-angell":{"throughline":"A scholar who spent years hoping to be right spends the rest of the expedition wishing he had been wrong.","peak":"S2-A1: Pnakotic fragments match murals","break":"S3-A1: Being right is worse than being wrong","ifPlayer":"The journal voice is dense, allusive, layered with cross-references — a scholar's marginalia grown into a narrative. The player experiences the peak as intellectual rapture: the mural patterns match the Pnakotic fragments, the proportions correspond to the Eltdown calculations, the confirmation is total and overwhelming. Three years of correlation, two ruined friendships, a career spent on the margins — all vindicated in a single moment of terrible proof. The journal entry for this scene should be the longest and most exhilarated the player has written. The break comes when vindication curdles. The player must reckon with the fact that being right means the rest of the texts are also right — including the parts about what happens next. The internal conflict is between the scholar who wanted confirmation and the human being who must now live inside a confirmed nightmare. His journal voice fragments: cross-references become frantic, annotations pile up in margins of margins, and somewhere in the density, the player finds Angell writing not as a scholar but as a frightened man asking the texts for guidance they were never designed to give.","ifNpc":"Angell is the man with the satchel, the three notebooks, the ink-stained cuffs. He quotes sources no one else has read. He is alternately brilliant and insufferable — he sees connections others miss, but he sees them loudly and at length. His dialogue is peppered with 'as the Pnakotic manuscripts suggest' and 'consistent with Eltdown's third theorem,' and most of the expedition has learned to tune him out. The MC should make the peak a moment of public vindication: Angell stands before the murals and translates them fluently, and for the first time, everyone is listening. After the break, the MC should show a man who has stopped quoting sources. He closes the satchel. He does not open the notebooks. If another character asks him what comes next according to his texts, he says: 'I would prefer not to discuss that.' He becomes protective of others in a way he never was before — urging caution, suggesting retreat — because he knows what the texts describe, and he knows they are no longer texts."},"believer-waverly":{"throughline":"A woman who carried other cultures' warnings across the ocean learns they were not warnings at all — they were instructions for the survivors.","peak":"S2-A1: Indigenous traditions confirmed","break":"S3-A1: Warnings were preparation, not prevention","ifPlayer":"The journal voice is layered — clinical nursing notes alongside fragments of oral tradition, remembered in the languages she learned them in. The player experiences the world through a double lens: the medical professional assessing frostbite, rationing supplies, monitoring morale; and the woman who has heard these exact descriptions before, in longhouses and on beaches ten thousand miles from here. The peak is confirmation without triumph — the oral traditions describe the geometry, the biology, the cold intelligence of what lives here, and they describe it accurately. The player feels the weight of cultures who knew and preserved the knowledge and were called primitive for it. The break reframes everything: the warnings were not meant to stop the expedition. They could never stop it. The warnings were instructions for after — how to endure, how to remember, how to carry the knowledge forward without being destroyed by it. The player's internal conflict is between the nurse who heals bodies and the witness who must now decide what kind of healing is possible for minds that have seen what she has seen.","ifNpc":"Waverly is calm in emergencies and unsettling in quiet moments. She treats injuries with practiced efficiency and asks patients questions about what they saw — not medically, but as a collector of testimony. Her dialogue is warm but slightly formal, the cadence of a woman who has lived in many languages and settled fully into none. She hums hymns while working but occasionally shifts into melodies that are older and stranger. The MC should use Waverly as the expedition's moral compass: she does not tell people what to do, but her quiet attention to their suffering makes cowardice and cruelty harder to sustain. After the break, the MC should show Waverly doing something no one expects: she stops treating the crisis as a medical emergency and begins treating it as a ritual. She arranges things. She marks thresholds. She tells people where to stand. If asked what she is doing, she says: 'The women of Rennell Island told me what to do if I ever found myself here. I did not believe them. I believe them now.'"},"patron-starkweather":{"throughline":"A patron whose faith drove the expedition south watches that faith become the instrument of everyone's unmaking.","peak":"S2-A1: Vindication becomes terror","break":"S3-A2: What he funded exceeds imagination","ifPlayer":"The journal voice is expansive, visionary, full of the rhetoric of a man who has staked everything on being right — fortune, reputation, the lives of everyone aboard. The player experiences Session 1 as triumph: every discovery validates the expense, every mile south proves Dyer was not mad and Starkweather was not a fool. The peak is the hinge — vindication arrives, and in the same breath, the player realizes that vindication and terror are the same thing. Dyer was right, which means what Dyer saw was real, which means what Dyer fled from is here. The journal voice shifts from visionary to desperate: the player must reckon with the moral weight of having funded this, having insisted on this, having overruled every cautious voice. The break is total: what Starkweather's money bought access to exceeds anything money can contain, control, or survive. The player's internal conflict is between the patron who believed and the man who must now live with the consequences of belief. His journal becomes a letter — to Moore, to Dyer's memory, to God — asking whether faith is still a virtue when the thing you had faith in turns out to be an abyss.","ifNpc":"Starkweather is the loudest man in any room and the most dangerous, because his enthusiasm is genuine and his authority is absolute. He quotes Dyer with the fervor of a convert. He overrules caution with the confidence of a man spending his own money. His dialogue is commands disguised as inspiration: 'We didn't come this far to stop now.' The MC should make Starkweather magnetic — players should want to follow him, should feel the pull of his certainty, even as they sense the cliff edge ahead. After the break, the MC should show the collapse of that magnetism. Starkweather goes quiet. He stops giving orders. He stands at the edge of what his money opened and says nothing, because for the first time in his life, he has encountered something that his will and his wealth cannot shape, cannot own, and cannot undo. If a player asks him what to do, he says: 'I don't know. I thought I would know.' The MC should make that admission the most frightening thing any NPC has said."},"patron-moore":{"throughline":"A skeptic's rational voice fades to static, and the silence it leaves behind is louder than anything it said.","peak":"S1-A2: Last coherent exchange","break":"S2-A1: Silence from the other end","ifPlayer":"Moore is unique — the player experiences the arc entirely through radio, through mediated distance. The journal is composed at a desk in Massachusetts, not on the ice, and the player must convey growing helplessness through the gap between what Moore demands and what the expedition can deliver. The peak is the last coherent exchange: Moore's voice comes through clear, asking for data, issuing instructions, maintaining the fiction that this is a scientific expedition under rational control. The player knows this is the last time the words will reach. The break is silence — not dramatic silence, but the ordinary silence of a radio that no longer connects. The player sits at the desk, turns the dials, hears static, and must write in the journal knowing that no one on the ice will read it. The internal conflict is between the empiricist who demanded evidence and the man who now has evidence he cannot reach, cannot verify, and cannot help. Moore's arc is the horror of distance: knowing something terrible is happening to people you sent there, and being unable to do anything except listen to the frequency where their voices used to be.","ifNpc":"Moore is a voice on the radio — clipped, skeptical, slightly impatient. He asks for measurements. He questions methodology. He reminds the expedition that extraordinary claims require extraordinary evidence. His dialogue is always mediated: Webb relays it, or the radio crackles, or the transmission cuts mid-sentence. The MC should establish Moore as the voice of the rational world — the tether to universities, newspapers, the daylit hemisphere where ice is just ice and mountains are just mountains. The peak is the last clean transmission: Moore's voice is clear, and everything he says is sensible, and the expedition will never hear anything sensible from that frequency again. After the break, Moore is absence. The MC should use that absence aggressively — characters reaching for the radio, forgetting, then remembering. Webb scanning Moore's frequency and finding nothing. If another NPC mentions Moore, the room goes quiet. He becomes the symbol of everything the expedition has left behind and cannot return to."}};
// ─── END INLINE DATA ───

// ─── CONSTANTS ───────────────────────────────────────────────────
var CW = 44, CH = 30, CP = 2, CR = 3;
var ROW_W = 170, COL_H = 72, CAT_H = 22, SESS_H = 24;

var DANGER = {
  0: { bg: '#131a2b', border: '#1e2d44', tx: '#3a4a5a' },
  1: { bg: '#6b5a2a', border: '#8a7a3a', tx: '#c4a35a' },
  2: { bg: '#c4a35a', border: '#d4b36a', tx: '#0a0e17' },
  3: { bg: '#e06f6f', border: '#e88a8a', tx: '#1a0808' }
};

var STATUS_MARK = { healthy:'', shaken:'~', injured:'!', critical:'!!', incapacitated:'X', dead:'\u2020' };

var GROUPS = [
  { label: 'Scientists', ids: ['scientist-pabodie','scientist-bryce'] },
  { label: 'Veterans',   ids: ['veteran-rourke'] },
  { label: 'Journalists',ids: ['journalist-caldwell'] },
  { label: 'Mechanics',  ids: ['mechanic-gedney','mechanic-webb'] },
  { label: 'Agents',     ids: ['agent-price','agent-ainsworth'] },
  { label: 'Experts',    ids: ['expert-sorensen','expert-mcready'] },
  { label: 'Believers',  ids: ['believer-angell','believer-waverly'] },
  { label: 'Patrons',    ids: ['patron-starkweather','patron-moore'] }
];

var NAMES = {
  'scientist-pabodie':'Dr. Pabodie','scientist-bryce':'Dr. Bryce',
  'veteran-rourke':'Sgt. Rourke','journalist-caldwell':'Caldwell',
  'mechanic-gedney':'Gedney','mechanic-webb':'Webb',
  'agent-price':'Price','agent-ainsworth':'Dr. Ainsworth',
  'expert-sorensen':'S\u00f8rensen','expert-mcready':'McReady',
  'believer-angell':'Prof. Angell','believer-waverly':'Sr. Waverly',
  'patron-starkweather':'Starkweather','patron-moore':'Prof. Moore'
};

var PHASES = { 0:'Preparation', 1:'Transit \u2192 Discovery', 2:'Revelation', 3:'Confrontation \u2192 Flight', 4:'The Return' };

// ─── STATE ───────────────────────────────────────────────────────
var sessions = [], arcs = {}, bmap = {};
var selChar = null, selCol = null;

// ─── DOM HELPERS ─────────────────────────────────────────────────
function el(tag, cls, text) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}

function clearChildren(node) {
  while (node.firstChild) node.removeChild(node.firstChild);
}

// ─── LOAD ────────────────────────────────────────────────────────
// Data is loaded either inline (via build script) or fetched from config/
(function load() {
  // Check if data was embedded by the build script
  if (typeof STORY_MATRIX_S0 !== 'undefined') {
    sessions = [STORY_MATRIX_S0, STORY_MATRIX_S1, STORY_MATRIX_S2, STORY_MATRIX_S3, STORY_MATRIX_S4];
    arcs = STORY_MATRIX_ARCS;
    initAndRender();
    return;
  }

  // Fallback: fetch from server
  var base = '';
  var p = window.location.pathname;
  if (p.indexOf('/the-ceremony') === 0) base = '/the-ceremony';

  Promise.all([
    fetch(base+'/config/story-matrix/s0.json').then(function(r){return r.json();}),
    fetch(base+'/config/story-matrix/s1.json').then(function(r){return r.json();}),
    fetch(base+'/config/story-matrix/s2.json').then(function(r){return r.json();}),
    fetch(base+'/config/story-matrix/s3.json').then(function(r){return r.json();}),
    fetch(base+'/config/story-matrix/s4.json').then(function(r){return r.json();}),
    fetch(base+'/config/story-matrix/arcs.json').then(function(r){return r.json();})
  ]).then(function(res) {
    sessions = res.slice(0,5);
    arcs = res[5];
    initAndRender();
  }).catch(function(e) {
    console.error('Load error:', e);
    document.getElementById('stats').textContent = 'Error loading data — run: node config/story-matrix/build-viz.js';
  });
})();

function initAndRender() {
  sessions.forEach(function(s) {
    s.beats.forEach(function(b) { bmap[b.characterId+'-'+b.session+'-'+b.act] = b; });
  });
  var n = sessions.reduce(function(s,x){return s+x.beats.length;},0);
  document.getElementById('stats').textContent = n+' beats \u00b7 14 characters \u00b7 18 acts';
  render();
}

// ─── RENDER ──────────────────────────────────────────────────────
function render() {
  var svg = d3.select('#matrix-svg');
  svg.selectAll('*').remove();

  var cols = [];
  sessions.forEach(function(s) {
    s.acts.forEach(function(a) {
      cols.push({ s:s.id, sn:s.name, a:a.index, an:a.name });
    });
  });

  var rows = [];
  GROUPS.forEach(function(g) {
    rows.push({ t:'cat', label:g.label });
    g.ids.forEach(function(id) { rows.push({ t:'char', id:id, name:NAMES[id]||id }); });
  });

  var y = COL_H;
  rows.forEach(function(r) { r.y = y; y += (r.t==='cat' ? CAT_H : CH+CP); });

  var W = ROW_W + cols.length*(CW+CP) + 16;
  var H = y + 12;
  svg.attr('width', W).attr('height', H);

  var g = svg.append('g');

  // Row highlight
  if (selChar) {
    var cr = rows.find(function(r){return r.t==='char'&&r.id===selChar;});
    if (cr) g.append('rect').attr('x',0).attr('y',cr.y-1).attr('width',W).attr('height',CH+2).attr('fill','#c4a35a').attr('opacity',0.04);
  }

  // Col highlight
  if (selCol) {
    var ci = cols.findIndex(function(c){return c.s===selCol.s&&c.a===selCol.a;});
    if (ci>=0) g.append('rect').attr('x',ROW_W+ci*(CW+CP)-1).attr('y',COL_H-4).attr('width',CW+2).attr('height',H-COL_H).attr('fill','#c4a35a').attr('opacity',0.06);
  }

  // Session headers
  var prev = -1, starts = [];
  cols.forEach(function(c,i) {
    if (c.s!==prev) { starts.push({i:i,s:c.s,n:c.sn,cnt:0}); prev=c.s; }
    starts[starts.length-1].cnt++;
  });

  var hg = g.append('g');
  starts.forEach(function(sh) {
    var x = ROW_W + sh.i*(CW+CP), w = sh.cnt*(CW+CP)-CP;
    hg.append('rect').attr('x',x).attr('y',2).attr('width',w).attr('height',SESS_H).attr('fill','#0d1220').attr('rx',4);
    hg.append('text').attr('class','session-label').attr('x',x+w/2).attr('y',16).attr('text-anchor','middle').text('S'+sh.s+': '+sh.n);
    hg.append('text').attr('class','phase-text').attr('x',x+w/2).attr('y',30).attr('text-anchor','middle').text(PHASES[sh.s]||'');
    if (sh.i>0) hg.append('line').attr('x1',x-1).attr('x2',x-1).attr('y1',2).attr('y2',H).attr('stroke','#1e2d44').attr('stroke-dasharray','4,4').attr('opacity',0.4);
  });

  // Act labels
  cols.forEach(function(c,i) {
    var x = ROW_W + i*(CW+CP) + CW/2;
    var lbl = c.an.length > 8 ? c.an.slice(0,7)+'\u2026' : c.an;
    hg.append('text').attr('class','act-col-label').attr('x',x).attr('y',COL_H-10).attr('text-anchor','middle').text(lbl)
      .on('click', (function(col){return function(){clickCol(col);};})(c));
  });

  // Rows
  var rg = g.append('g');
  rows.forEach(function(row) {
    if (row.t==='cat') {
      var cg = rg.append('g').attr('transform','translate(0,'+row.y+')');
      cg.append('line').attr('x1',10).attr('x2',ROW_W-8).attr('y1',CAT_H-1).attr('y2',CAT_H-1).attr('stroke','#c4a35a').attr('stroke-opacity',0.2);
      cg.append('text').attr('class','category-label').attr('x',10).attr('y',CAT_H/2+1).attr('dy','0.35em').text(row.label);
    } else {
      var ig = rg.append('g').attr('transform','translate(0,'+row.y+')');
      ig.append('text')
        .attr('class','row-label'+(selChar===row.id?' hl':''))
        .attr('x',14).attr('y',CH/2).attr('dy','0.35em').text(row.name)
        .on('click',(function(id){return function(){clickRow(id);};})(row.id));

      cols.forEach(function(col,ci) {
        var b = bmap[row.id+'-'+col.s+'-'+col.a];
        if (!b) return;
        var d = b.danger||0, clr = DANGER[d];
        var absent = b.narrativeRole==='absent';
        var dim = (selChar && selChar!==row.id) || (selCol && (selCol.s!==col.s||selCol.a!==col.a));
        var isSel = selChar===row.id && selCol && selCol.s===col.s && selCol.a===col.a;
        var cx = ROW_W + ci*(CW+CP);

        var cell = ig.append('rect')
          .attr('class','cell'+(dim?' dim':'')+(isSel?' sel':''))
          .attr('x',cx).attr('y',0).attr('width',CW).attr('height',CH).attr('rx',CR).attr('ry',CR)
          .attr('fill',absent?'#0a0e17':clr.bg)
          .attr('stroke',absent?'#1a1a2a':(isSel?'#c4a35a':clr.border))
          .attr('stroke-width',isSel?2:0.5);

        if (!absent && b.status!=='healthy' && STATUS_MARK[b.status]) {
          ig.append('text').attr('x',cx+CW/2).attr('y',CH/2).attr('dy','0.35em')
            .attr('text-anchor','middle').attr('fill',clr.tx).attr('font-size','10px').attr('font-weight','500')
            .attr('pointer-events','none').attr('opacity',dim?0.15:1).text(STATUS_MARK[b.status]);
        }

        if (absent) {
          ig.append('text').attr('x',cx+CW/2).attr('y',CH/2).attr('dy','0.35em')
            .attr('text-anchor','middle').attr('fill','#2a2a3a').attr('font-size','12px')
            .attr('pointer-events','none').text('\u2013');
        }

        if (b.mcNote) {
          ig.append('circle').attr('cx',cx+5).attr('cy',CH-5).attr('r',2)
            .attr('fill','#b87adb').attr('pointer-events','none').attr('opacity',dim?0.08:0.7);
        }

        (function(beat,col) {
          cell.on('mouseover',function(ev){showTip(ev,beat,col);})
            .on('mousemove',function(ev){moveTip(ev);})
            .on('mouseout',hideTip)
            .on('click',function(){clickCell(beat);});
        })(b,col);
      });
    }
  });
}

// ─── INTERACTIONS ────────────────────────────────────────────────
function clickRow(id) {
  if (selChar===id && !selCol) { selChar=null; } else { selChar=id; selCol=null; }
  render(); updatePanel();
}

function clickCol(col) {
  if (selCol && selCol.s===col.s && selCol.a===col.a && !selChar) { selCol=null; } else { selCol={s:col.s,a:col.a}; selChar=null; }
  render(); updatePanel();
}

function clickCell(beat) {
  selChar=beat.characterId; selCol={s:beat.session,a:beat.act};
  render(); showBeat(beat);
}

function clearSel() {
  selChar=null; selCol=null;
  document.getElementById('detail-panel').classList.remove('open');
  render();
}

// ─── DETAIL PANEL (DOM-based) ────────────────────────────────────
function updatePanel() {
  if (!selChar && !selCol) { document.getElementById('detail-panel').classList.remove('open'); return; }
  document.getElementById('detail-panel').classList.add('open');
  if (selChar && !selCol) showCharPanel(selChar);
  else if (selCol && !selChar) showColPanel(selCol);
}

function showCharPanel(id) {
  var panel = document.getElementById('detail-panel'); panel.classList.add('open');
  document.getElementById('dp-title').textContent = NAMES[id]||id;
  document.getElementById('dp-sub').textContent = id;
  var body = document.getElementById('dp-body');
  clearChildren(body);

  var arc = arcs[id];
  if (arc) {
    var ad = el('div','d-arc');
    ad.appendChild(el('div','d-throughline','\u201c'+arc.throughline+'\u201d'));
    [['Peak',arc.peak],['Break',arc['break']],['Player',arc.ifPlayer],['NPC',arc.ifNpc]].forEach(function(pair) {
      var row = el('div','d-arc-row');
      row.appendChild(el('span','d-arc-label',pair[0]));
      row.appendChild(el('span','d-arc-val',pair[1]));
      ad.appendChild(row);
    });
    body.appendChild(ad);
  }

  // Danger sparkline
  var sec = el('div','d-section');
  sec.style.marginTop = '16px';
  sec.appendChild(el('div','d-title','Danger trajectory'));
  var bar = el('div');
  bar.style.cssText = 'display:flex;gap:2px;align-items:end;height:40px;';
  sessions.forEach(function(s) {
    s.acts.forEach(function(a) {
      var b = bmap[id+'-'+s.id+'-'+a.index];
      var d = b ? b.danger : 0;
      var c = DANGER[d];
      var pip = el('div');
      pip.style.cssText = 'width:14px;height:'+(6+d*10)+'px;background:'+c.bg+';border-radius:2px;border:1px solid '+c.border+';';
      bar.appendChild(pip);
    });
  });
  sec.appendChild(bar);
  body.appendChild(sec);

  // Final knowledge
  var lastBeat = null;
  sessions.forEach(function(s) {
    s.acts.forEach(function(a) {
      var b = bmap[id+'-'+s.id+'-'+a.index];
      if (b && b.knowledge && b.knowledge.length>0) lastBeat = b;
    });
  });
  if (lastBeat && lastBeat.knowledge.length>0) {
    var ks = el('div','d-section');
    ks.appendChild(el('div','d-title','Final knowledge ('+lastBeat.knowledge.length+')'));
    var kd = el('div');
    lastBeat.knowledge.forEach(function(k) { kd.appendChild(el('span','d-tag d-tag-know',k)); });
    ks.appendChild(kd);
    body.appendChild(ks);
  }
}

function showColPanel(col) {
  var panel = document.getElementById('detail-panel'); panel.classList.add('open');
  var sess = sessions.find(function(s){return s.id===col.s;});
  var act = sess?sess.acts.find(function(a){return a.index===col.a;}):null;
  document.getElementById('dp-title').textContent = 'S'+col.s+'-A'+col.a;
  document.getElementById('dp-sub').textContent = (act?act.name:'')+' \u00b7 '+(sess?sess.name:'');
  var body = document.getElementById('dp-body');
  clearChildren(body);

  GROUPS.forEach(function(group) {
    group.ids.forEach(function(id) {
      var b = bmap[id+'-'+col.s+'-'+col.a];
      if (!b) return;
      var absent = b.narrativeRole==='absent';
      var c = DANGER[b.danger||0];

      var card = el('div','act-card');
      card.style.borderLeftColor = absent ? '#1a1a2a' : c.bg;
      var nm = el('div','act-card-name', NAMES[id]);
      nm.style.color = absent ? '#3a3a4a' : '#c4a35a';
      card.appendChild(nm);
      card.appendChild(el('div','act-card-meta', b.location+' \u00b7 '+b.status+(absent?'':' \u00b7 danger '+b.danger)));
      if (!absent) card.appendChild(el('div','act-card-note', b.activity));
      body.appendChild(card);
    });
  });
}

function showBeat(beat) {
  var panel = document.getElementById('detail-panel'); panel.classList.add('open');
  var name = NAMES[beat.characterId]||beat.characterId;
  var sess = sessions.find(function(s){return s.id===beat.session;});
  var act = sess?sess.acts.find(function(a){return a.index===beat.act;}):null;
  var c = DANGER[beat.danger||0];

  document.getElementById('dp-title').textContent = name;
  document.getElementById('dp-sub').textContent = 'S'+beat.session+'-A'+beat.act+': '+(act?act.name:'');

  var body = document.getElementById('dp-body');
  clearChildren(body);

  // Tags row
  var tags = el('div');
  tags.style.cssText = 'display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;';
  var dt = el('span','d-tag','Danger '+beat.danger);
  dt.style.cssText = 'border-color:'+c.border+';background:'+c.bg+';color:'+c.tx+';';
  tags.appendChild(dt);
  tags.appendChild(el('span','d-tag',beat.status));
  tags.appendChild(el('span','d-tag',beat.narrativeRole));
  body.appendChild(tags);

  // Sections
  function addSection(title, text, style) {
    var s = el('div','d-section');
    s.appendChild(el('div','d-title',title));
    var v = el('div','d-value',text);
    if (style) v.style.cssText = style;
    s.appendChild(v);
    body.appendChild(s);
  }

  addSection('Location', beat.location);
  addSection('Emotional', beat.emotional, 'color:#b87adb;font-style:italic;');
  addSection('Activity', beat.activity);

  // Knowledge
  if (beat.knowledge && beat.knowledge.length>0) {
    var ks = el('div','d-section');
    ks.appendChild(el('div','d-title','Knowledge ('+beat.knowledge.length+')'));
    var kd = el('div');
    beat.knowledge.forEach(function(k) { kd.appendChild(el('span','d-tag d-tag-know',k)); });
    ks.appendChild(kd);
    body.appendChild(ks);
  }

  // Threads
  if (beat.threadsActive && beat.threadsActive.length>0) {
    var ts = el('div','d-section');
    ts.appendChild(el('div','d-title','Active threads'));
    var td = el('div');
    beat.threadsActive.forEach(function(t) { td.appendChild(el('span','d-tag d-tag-thread',t)); });
    ts.appendChild(td);
    body.appendChild(ts);
  }

  // MC Note
  if (beat.mcNote) {
    var ms = el('div','d-section');
    ms.appendChild(el('div','d-title','MC Note'));
    ms.appendChild(el('div','d-mc',beat.mcNote));
    body.appendChild(ms);
  }

  // NPC Behavior
  if (beat.npcBehavior) {
    var ns = el('div','d-section');
    ns.appendChild(el('div','d-title','NPC Behavior'));
    ns.appendChild(el('div','d-npc',beat.npcBehavior));
    body.appendChild(ns);
  }

  // Arc
  var arc = arcs[beat.characterId];
  if (arc) {
    var ad = el('div','d-arc');
    ad.appendChild(el('div','d-title','Character arc'));
    ad.appendChild(el('div','d-throughline',arc.throughline));
    [['Peak',arc.peak],['Break',arc['break']]].forEach(function(pair) {
      var row = el('div','d-arc-row');
      row.appendChild(el('span','d-arc-label',pair[0]));
      row.appendChild(el('span','d-arc-val',pair[1]));
      ad.appendChild(row);
    });
    body.appendChild(ad);
  }
}

// ─── TOOLTIP (DOM-based) ─────────────────────────────────────────
function showTip(ev,b,col) {
  var tt = document.getElementById('tooltip');
  clearChildren(tt);

  var absent = b.narrativeRole==='absent';

  var charDiv = el('div','','');
  charDiv.style.cssText = 'color:#c4a35a;font-weight:500;';
  charDiv.textContent = NAMES[b.characterId]||b.characterId;
  tt.appendChild(charDiv);

  var actDiv = el('div','','S'+b.session+'-A'+b.act+': '+col.an);
  actDiv.style.cssText = 'color:#7ba4c7;font-size:10px;margin-bottom:4px;';
  tt.appendChild(actDiv);

  var locDiv = el('div','',b.location);
  locDiv.style.cssText = 'color:#6a7a8a;font-size:10px;';
  tt.appendChild(locDiv);

  if (!absent) {
    var activityDiv = el('div','',b.activity);
    activityDiv.style.cssText = 'margin-top:6px;color:#c8bca8;';
    tt.appendChild(activityDiv);

    var emoDiv = el('div','',b.emotional);
    emoDiv.style.cssText = 'color:#b87adb;font-style:italic;margin-top:4px;';
    tt.appendChild(emoDiv);
  } else {
    var abDiv = el('div','','Not present');
    abDiv.style.cssText = 'color:#3a3a4a;margin-top:4px;font-style:italic;';
    tt.appendChild(abDiv);
  }

  var hintDiv = el('div','','Click for details');
  hintDiv.style.cssText = 'margin-top:6px;color:#3a4a5a;font-size:9px;';
  tt.appendChild(hintDiv);

  tt.classList.add('visible');
  moveTip(ev);
}

function moveTip(ev) {
  var tt = document.getElementById('tooltip');
  var r = tt.getBoundingClientRect();
  var x = ev.clientX+14, y = ev.clientY-10;
  if (x+r.width>window.innerWidth-10) x = ev.clientX-r.width-14;
  if (y+r.height>window.innerHeight-10) y = ev.clientY-r.height+10;
  if (y<10) y=10;
  tt.style.left = x+'px';
  tt.style.top = y+'px';
}

function hideTip() { document.getElementById('tooltip').classList.remove('visible'); }
</script>
