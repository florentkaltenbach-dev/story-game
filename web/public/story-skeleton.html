function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) {
    Object.entries(attrs).forEach(function(kv) {
      var k = kv[0], v = kv[1];
      if (k === 'text') e.textContent = v;
      else if (k === 'className') e.className = v;
      else if (k === 'style' && typeof v === 'object') {
        Object.entries(v).forEach(function(sv) { e.style[sv[0]] = sv[1]; });
      }
      else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
      else e.setAttribute(k, v);
    });
  }
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(function(c) {
      if (typeof c === 'string') e.appendChild(document.createTextNode(c));
      else if (c) e.appendChild(c);
    });
  }
  return e;
}

function buildThreadDropdown() {
  var dd = el('div', { className: 'thread-dropdown' });
  THREADS.forEach(function(t) {
    var swatch = el('span', { className: 'thread-swatch', style: { backgroundColor: t.color } });
    var item = el('div', {
      className: 'thread-item active',
      onClick: function(e) {
        e.stopPropagation();
        state.activeThreads[t.id] = !state.activeThreads[t.id];
        item.className = 'thread-item' + (state.activeThreads[t.id] ? ' active' : ' inactive');
        swatch.style.opacity = state.activeThreads[t.id] ? '1' : '0.3';
        renderThreads();
      }
    }, [swatch, t.name]);
    dd.appendChild(item);
  });
  return dd;
}

/* Close dropdown on outside click */
document.addEventListener('click', function(e) {
  if (state.threadDropdownOpen) {
    var btn = document.getElementById('toggle-threads');
    if (!btn.contains(e.target)) {
      state.threadDropdownOpen = false;
      var dd = btn.querySelector('.thread-dropdown');
      if (dd) dd.className = 'thread-dropdown';
    }
  }
  var sp = document.querySelector('.sensory-popup');
  if (sp && sp.classList.contains('visible')) {
    var sensBtn = document.getElementById('toggle-sensory');
    if (!sp.contains(e.target) && !sensBtn.contains(e.target)) {
      sp.classList.remove('visible');
      state.overlays.sensory = false;
      sensBtn.className = 'overlay-btn';
    }
  }
});

function toggleOverlay(key) {
  if (key === 'sensory') {
    toggleSensoryPopup();
    return;
  }
  state.overlays[key] = !state.overlays[key];
  var btn = document.getElementById('toggle-' + key);
  btn.className = 'overlay-btn' + (state.overlays[key] ? ' active' : '');
  if (key === 'threads') renderThreads();
  else if (key === 'strata') renderStrata();
  else if (key === 'decisions') renderDecisions();
}

/* ── Compute Layout ── */
var layout = {};

function computeLayout() {
  var container = document.getElementById('svg-container');
  var W = container.clientWidth;
  var H = container.clientHeight;

  layout.W = W;
  layout.H = H;

  var totalPad = COL_PAD * 6;
  var colW = (W - totalPad) / 5;
  layout.colW = colW;

  layout.sessions = SESSIONS.map(function(s, si) {
    var x = COL_PAD + si * (colW + COL_PAD);
    var totalDuration = s.acts.reduce(function(sum, a) { return sum + a.duration; }, 0);
    var availH = H - SESSION_HEADER_H - 24;
    var y = SESSION_HEADER_H;
    var acts = s.acts.map(function(a, ai) {
      var actH = (a.duration / totalDuration) * availH;
      var result = { x: x, y: y, w: colW, h: actH, act: a, actIndex: ai, sessionIndex: si };
      y += actH;
      return result;
    });
    return { x: x, y: 0, w: colW, h: H, acts: acts, session: s };
  });
}

/* ── Render Functions ── */
function render() {
  computeLayout();
  renderColumns();
  renderStrata();
  renderThreads();
  renderDecisions();
  renderGeoTrack();
}

function renderColumns() {
  columnLayer.selectAll('*').remove();

  layout.sessions.forEach(function(sl) {
    var s = sl.session;
    var g = columnLayer.append('g')
      .attr('class', 'session-col')
      .attr('transform', 'translate(' + sl.x + ',0)');

    /* Column background */
    g.append('rect')
      .attr('x', 0).attr('y', 0)
      .attr('width', sl.w).attr('height', sl.h)
      .attr('fill', 'url(#col-grad-' + s.id + ')')
      .attr('rx', 4);

    /* Session header background */
    g.append('rect')
      .attr('x', 0).attr('y', 0)
      .attr('width', sl.w).attr('height', SESSION_HEADER_H)
      .attr('fill', s.color)
      .attr('fill-opacity', 0.1)
      .attr('rx', 4);

    /* Top color bar */
    g.append('rect')
      .attr('x', 0).attr('y', 0)
      .attr('width', sl.w).attr('height', 3)
      .attr('fill', s.color)
      .attr('rx', 1);

    /* Session label */
    g.append('text')
      .attr('x', 10).attr('y', 22)
      .attr('fill', s.color)
      .attr('font-family', "'Crimson Text', serif")
      .attr('font-size', 15)
      .attr('font-weight', 600)
      .text('S' + s.id + ': ' + s.name);

    /* Duration + act count */
    g.append('text')
      .attr('x', 10).attr('y', 40)
      .attr('fill', '#6a7a8a')
      .attr('font-family', "'JetBrains Mono', monospace")
      .attr('font-size', 10)
      .text(s.duration + ' min \u00b7 ' + s.acts.length + ' acts');

    /* Session header click target */
    g.append('rect')
      .attr('x', 0).attr('y', 0)
      .attr('width', sl.w).attr('height', SESSION_HEADER_H)
      .attr('fill', 'transparent')
      .attr('cursor', 'pointer')
      .on('click', function() { showSessionSidebar(s); })
      .on('mouseover', function(event) { showTooltip(event, s.dramaticQuestion); })
      .on('mousemove', moveTooltip)
      .on('mouseout', hideTooltip);

    /* Acts */
    sl.acts.forEach(function(al) {
      var ag = g.append('g')
        .attr('transform', 'translate(0,' + al.y + ')');

      /* Act card background */
      ag.append('rect')
        .attr('x', 3).attr('y', 2)
        .attr('width', sl.w - 6).attr('height', Math.max(al.h - 4, 6))
        .attr('fill', '#0d1220')
        .attr('stroke', s.color)
        .attr('stroke-opacity', 0.2)
        .attr('stroke-width', 0.5)
        .attr('rx', 3)
        .attr('filter', 'url(#card-shadow)');

      /* Act header stripe */
      ag.append('rect')
        .attr('x', 3).attr('y', 2)
        .attr('width', sl.w - 6).attr('height', Math.min(ACT_HEADER_H, al.h - 4))
        .attr('fill', s.color)
        .attr('fill-opacity', 0.06)
        .attr('rx', 3);

      /* Left accent line */
      ag.append('rect')
        .attr('x', 3).attr('y', 2)
        .attr('width', 2).attr('height', Math.max(al.h - 4, 6))
        .attr('fill', s.color)
        .attr('fill-opacity', 0.4)
        .attr('rx', 1);

      /* Act name */
      ag.append('text')
        .attr('x', 12).attr('y', 17)
        .attr('fill', '#e8dcc8')
        .attr('font-family', "'Crimson Text', serif")
        .attr('font-size', 12)
        .attr('font-weight', 600)
        .text(al.act.name);

      /* Act duration */
      ag.append('text')
        .attr('x', sl.w - 14).attr('y', 17)
        .attr('fill', '#4a5568')
        .attr('font-family', "'JetBrains Mono', monospace")
        .attr('font-size', 9)
        .attr('text-anchor', 'end')
        .text(al.act.duration + 'm');

      /* Purpose */
      if (al.h > ACT_HEADER_H + 14) {
        ag.append('text')
          .attr('x', 12).attr('y', ACT_HEADER_H - 2)
          .attr('fill', '#6a7a8a')
          .attr('font-size', 9)
          .attr('font-style', 'italic')
          .text(al.act.purpose);
      }

      /* Beat lines */
      var beatY = ACT_HEADER_H + 10;
      var maxBeats = Math.floor((al.h - ACT_HEADER_H - 12) / BEAT_LINE_H);
      var maxChars = Math.floor((sl.w - 32) / 5.5);

      al.act.beats.forEach(function(beat, bi) {
        if (bi >= maxBeats || bi >= 8) return;
        var truncated = beat;
        if (truncated.length > maxChars) {
          truncated = truncated.substring(0, maxChars - 1) + '\u2026';
        }
        ag.append('text')
          .attr('x', 18).attr('y', beatY + bi * BEAT_LINE_H)
          .attr('fill', '#6a7a8a')
          .attr('font-family', "'JetBrains Mono', monospace")
          .attr('font-size', 9)
          .text('\u2022 ' + truncated);
      });

      /* Overflow indicator */
      var shown = Math.min(maxBeats, 8);
      if (al.act.beats.length > shown && shown > 0) {
        ag.append('text')
          .attr('x', 18).attr('y', beatY + shown * BEAT_LINE_H)
          .attr('fill', '#3a4a5a')
          .attr('font-size', 8)
          .text('+ ' + (al.act.beats.length - shown) + ' more');
      }

      /* Click target for act */
      ag.append('rect')
        .attr('x', 3).attr('y', 2)
        .attr('width', sl.w - 6).attr('height', Math.max(al.h - 4, 6))
        .attr('fill', 'transparent')
        .attr('cursor', 'pointer')
        .on('click', function() { showActSidebar(s, al.act, al.actIndex); })
        .on('mouseover', function(event) {
          d3.select(this.parentNode).select('rect').transition().duration(150)
            .attr('stroke-opacity', 0.5);
          showTooltip(event, al.act.name + ' \u2014 ' + al.act.purpose);
        })
        .on('mousemove', moveTooltip)
        .on('mouseout', function() {
          d3.select(this.parentNode).select('rect').transition().duration(150)
            .attr('stroke-opacity', 0.2);
          hideTooltip();
        });
    });
  });
}

function renderStrata() {
  strataLayer.selectAll('*').remove();
  if (!state.overlays.strata) return;

  var bandH = layout.H / STRATA.length;

  STRATA.forEach(function(stratum, si) {
    var bandY = si * bandH;

    /* Label on far left */
    strataLayer.append('text')
      .attr('x', 4).attr('y', bandY + 14)
      .attr('fill', stratum.color)
      .attr('fill-opacity', 0.5)
      .attr('font-size', 8)
      .attr('font-family', "'JetBrains Mono', monospace")
      .text(stratum.name)
      .style('pointer-events', 'none');

    layout.sessions.forEach(function(sl, colIdx) {
      var opacity = stratum.opacities[colIdx];
      if (opacity <= 0.01) return;

      strataLayer.append('rect')
        .attr('x', sl.x)
        .attr('y', bandY + 2)
        .attr('width', sl.w)
        .attr('height', bandH - 4)
        .attr('fill', stratum.color)
        .attr('fill-opacity', opacity * 0.1)
        .attr('rx', 3)
        .style('pointer-events', 'none');

      /* Intensity bar top edge */
      strataLayer.append('rect')
        .attr('x', sl.x + 2)
        .attr('y', bandY + 2)
        .attr('width', sl.w - 4)
        .attr('height', 2)
        .attr('fill', stratum.color)
        .attr('fill-opacity', opacity * 0.45)
        .attr('rx', 1)
        .style('pointer-events', 'none');

      /* Opacity value label */
      if (opacity >= 0.3) {
        strataLayer.append('text')
          .attr('x', sl.x + sl.w / 2)
          .attr('y', bandY + bandH / 2 + 3)
          .attr('text-anchor', 'middle')
          .attr('fill', stratum.color)
          .attr('fill-opacity', opacity * 0.4)
          .attr('font-size', 10)
          .attr('font-family', "'JetBrains Mono', monospace")
          .text(Math.round(opacity * 100) + '%')
          .style('pointer-events', 'none');
      }
    });
  });
}

/* Get center point of an act for thread routing */
function getActAnchor(sessionIdx, actIdx, side) {
  var sl = layout.sessions[sessionIdx];
  if (!sl) return { x: 0, y: 0 };
  var al = sl.acts[Math.min(actIdx, sl.acts.length - 1)];
  var cx = sl.x + sl.w / 2;
  var cy = al.y + al.h / 2;
  if (side === 'right') cx = sl.x + sl.w + 4;
  else if (side === 'left') cx = sl.x - 4;
  return { x: cx, y: cy };
}

function renderThreads() {
  threadLayer.selectAll('*').remove();
  if (!state.overlays.threads) return;

  var line = d3.line()
    .x(function(d) { return d.x; })
    .y(function(d) { return d.y; })
    .curve(d3.curveBasis);

  THREADS.forEach(function(t) {
    if (!state.activeThreads[t.id]) return;

    var points = [];
    var start = getActAnchor(t.plantSession, t.plantAct);

    /* Build control points for smooth routing */
    if (t.plantSession === t.paySession) {
      /* Intra-session thread: arc to the right */
      var end = getActAnchor(t.paySession, t.payAct);
      var sl = layout.sessions[t.plantSession];
      var bulge = sl.x + sl.w + 30;
      points.push(start);
      points.push({ x: bulge, y: start.y });
      if (t.waypoints) {
        t.waypoints.forEach(function(wp) {
          var wpt = getActAnchor(wp.session, wp.act);
          points.push({ x: bulge + 10, y: wpt.y });
        });
      }
      points.push({ x: bulge, y: end.y });
      points.push(end);
    } else {
      /* Inter-session thread: route through gaps between columns */
      var startRight = getActAnchor(t.plantSession, t.plantAct, 'right');
      var endLeft = getActAnchor(t.paySession, t.payAct, 'left');
      points.push(start);
      points.push(startRight);

      if (t.waypoints) {
        t.waypoints.forEach(function(wp) {
          var wpt = getActAnchor(wp.session, wp.act);
          points.push(wpt);
        });
      }

      points.push(endLeft);
      points.push(getActAnchor(t.paySession, t.payAct));
    }

    /* The arc path */
    threadLayer.append('path')
      .datum(points)
      .attr('d', line)
      .attr('fill', 'none')
      .attr('stroke', t.color)
      .attr('stroke-width', 2.5)
      .attr('stroke-opacity', 0.55)
      .attr('stroke-dasharray', '8,4')
      .style('pointer-events', 'stroke')
      .style('cursor', 'pointer')
      .on('mouseover', function(event) {
        d3.select(this).attr('stroke-opacity', 0.9).attr('stroke-width', 4);
        showTooltip(event, t.name);
      })
      .on('mousemove', moveTooltip)
      .on('mouseout', function() {
        d3.select(this).attr('stroke-opacity', 0.55).attr('stroke-width', 2.5);
        hideTooltip();
      })
      .on('click', function() { showThreadSidebar(t); });

    /* Plant marker (filled circle) */
    threadLayer.append('circle')
      .attr('cx', start.x).attr('cy', start.y)
      .attr('r', 5)
      .attr('fill', t.color)
      .attr('fill-opacity', 0.85)
      .attr('stroke', '#0a0e17')
      .attr('stroke-width', 2)
      .style('cursor', 'pointer')
      .on('mouseover', function(event) { showTooltip(event, t.name + ' (planted)'); })
      .on('mousemove', moveTooltip)
      .on('mouseout', hideTooltip)
      .on('click', function() { showThreadSidebar(t); });

    /* Payoff marker (diamond) */
    var payPt = getActAnchor(t.paySession, t.payAct);
    var d = 6;
    threadLayer.append('path')
      .attr('d', 'M' + payPt.x + ',' + (payPt.y - d) +
        'L' + (payPt.x + d) + ',' + payPt.y +
        'L' + payPt.x + ',' + (payPt.y + d) +
        'L' + (payPt.x - d) + ',' + payPt.y + 'Z')
      .attr('fill', t.color)
      .attr('fill-opacity', 0.85)
      .attr('stroke', '#0a0e17')
      .attr('stroke-width', 2)
      .style('cursor', 'pointer')
      .on('mouseover', function(event) { showTooltip(event, t.name + ' (payoff)'); })
      .on('mousemove', moveTooltip)
      .on('mouseout', hideTooltip)
      .on('click', function() { showThreadSidebar(t); });

    /* Waypoint markers (small circles) */
    if (t.waypoints) {
      t.waypoints.forEach(function(wp) {
        var wpt = getActAnchor(wp.session, wp.act);
        threadLayer.append('circle')
          .attr('cx', wpt.x).attr('cy', wpt.y)
          .attr('r', 3)
          .attr('fill', t.color)
          .attr('fill-opacity', 0.5)
          .attr('stroke', '#0a0e17')
          .attr('stroke-width', 1)
          .style('pointer-events', 'none');
      });
    }
  });
}

function renderDecisions() {
  decisionLayer.selectAll('*').remove();
  if (!state.overlays.decisions) return;

  DECISIONS.forEach(function(dec) {
    var center = getActAnchor(dec.session, dec.act);
    var x = center.x;
    var y = center.y;
    var sz = 11;

    var dg = decisionLayer.append('g')
      .attr('transform', 'translate(' + x + ',' + y + ')')
      .style('cursor', 'pointer')
      .on('mouseover', function(event) {
        d3.select(this).select('.dec-diamond').transition().duration(100)
          .attr('fill-opacity', 1);
        d3.select(this).select('.dec-glow').transition().duration(100)
          .attr('fill-opacity', 0.25);
        showTooltip(event, dec.name + ' \u2014 ' + dec.stakes);
      })
      .on('mousemove', function(event) { moveTooltip(event); })
      .on('mouseout', function() {
        d3.select(this).select('.dec-diamond').transition().duration(200)
          .attr('fill-opacity', 0.75);
        d3.select(this).select('.dec-glow').transition().duration(200)
          .attr('fill-opacity', 0.12);
        hideTooltip();
      })
      .on('click', function() { showDecisionSidebar(dec); });

    /* Outer glow */
    dg.append('path')
      .attr('d', diamond(0, 0, sz + 4))
      .attr('fill', '#c4a35a')
      .attr('fill-opacity', 0.12)
      .attr('class', 'dec-glow');

    /* Main diamond */
    dg.append('path')
      .attr('d', diamond(0, 0, sz))
      .attr('fill', '#c4a35a')
      .attr('fill-opacity', 0.75)
      .attr('stroke', '#0a0e17')
      .attr('stroke-width', 2)
      .attr('class', 'dec-diamond');

    /* Exclamation */
    dg.append('text')
      .attr('x', 0).attr('y', 4)
      .attr('text-anchor', 'middle')
      .attr('fill', '#0a0e17')
      .attr('font-size', 12)
      .attr('font-weight', 'bold')
      .attr('font-family', "'Crimson Text', serif")
      .text('!');

    /* Label beneath */
    var label = dec.name.length > 22 ? dec.name.substring(0, 20) + '\u2026' : dec.name;
    dg.append('text')
      .attr('x', 0).attr('y', sz + 14)
      .attr('text-anchor', 'middle')
      .attr('fill', '#c4a35a')
      .attr('fill-opacity', 0.7)
      .attr('font-size', 8)
      .attr('font-family', "'JetBrains Mono', monospace")
      .text(label);
  });
}

function diamond(cx, cy, r) {
  return 'M' + cx + ',' + (cy - r) +
    'L' + (cx + r) + ',' + cy +
    'L' + cx + ',' + (cy + r) +
    'L' + (cx - r) + ',' + cy + 'Z';
}

function renderGeoTrack() {
  geoSvg.selectAll('*').remove();

  var container = document.getElementById('geo-track');
  var W = container.clientWidth;
  var H = container.clientHeight;
  var padL = 60;
  var padR = 40;
  var midY = H / 2 - 4;
  var usableW = W - padL - padR;

  /* Left label */
  geoSvg.append('text')
    .attr('x', 10).attr('y', midY + 4)
    .attr('fill', '#4a5568')
    .attr('font-size', 10)
    .attr('font-family', "'Crimson Text', serif")
    .attr('font-style', 'italic')
    .text('Journey');

  /* Line segments colored by session */
  for (var i = 0; i < LOCATIONS.length - 1; i++) {
    var from = LOCATIONS[i];
    var to = LOCATIONS[i + 1];
    var x1 = padL + from.x * usableW;
    var x2 = padL + to.x * usableW;
    var color = SESSIONS[from.session].color;
    /* If the next location is a different session, blend */
    if (to.session !== from.session) {
      /* Draw first half in from-color, second half in to-color */
      var mx = (x1 + x2) / 2;
      geoSvg.append('line')
        .attr('x1', x1).attr('y1', midY)
        .attr('x2', mx).attr('y2', midY)
        .attr('stroke', color)
        .attr('stroke-width', 2)
        .attr('stroke-opacity', 0.45);
      geoSvg.append('line')
        .attr('x1', mx).attr('y1', midY)
        .attr('x2', x2).attr('y2', midY)
        .attr('stroke', SESSIONS[to.session].color)
        .attr('stroke-width', 2)
        .attr('stroke-opacity', 0.45);
    } else {
      geoSvg.append('line')
        .attr('x1', x1).attr('y1', midY)
        .attr('x2', x2).attr('y2', midY)
        .attr('stroke', color)
        .attr('stroke-width', 2)
        .attr('stroke-opacity', 0.45);
    }
  }

  /* Location markers */
  LOCATIONS.forEach(function(loc) {
    var x = padL + loc.x * usableW;
    var color = SESSIONS[loc.session].color;

    geoSvg.append('circle')
      .attr('cx', x).attr('cy', midY)
      .attr('r', 5)
      .attr('fill', '#0d1220')
      .attr('stroke', color)
      .attr('stroke-width', 2)
      .style('cursor', 'pointer')
      .on('mouseover', function(event) {
        d3.select(this).transition().duration(100).attr('r', 7).attr('fill', color);
        showTooltip(event, loc.name + ' (S' + loc.session + ')');
      })
      .on('mousemove', moveTooltip)
      .on('mouseout', function() {
        d3.select(this).transition().duration(150).attr('r', 5).attr('fill', '#0d1220');
        hideTooltip();
      })
      .on('click', function() { showLocationSidebar(loc); });

    /* Label */
    geoSvg.append('text')
      .attr('x', x).attr('y', midY + 18)
      .attr('text-anchor', 'middle')
      .attr('fill', '#5a6a7a')
      .attr('font-size', 8)
      .attr('font-family', "'JetBrains Mono', monospace")
      .text(loc.name);
  });
}

/* ── Sensory Popup ── */
var sensoryPopup = null;

function toggleSensoryPopup() {
  if (sensoryPopup && sensoryPopup.classList.contains('visible')) {
    sensoryPopup.classList.remove('visible');
    state.overlays.sensory = false;
    document.getElementById('toggle-sensory').className = 'overlay-btn';
    return;
  }

  state.overlays.sensory = true;
  document.getElementById('toggle-sensory').className = 'overlay-btn active';

  if (!sensoryPopup) {
    sensoryPopup = buildSensoryPopup();
    document.body.appendChild(sensoryPopup);
  }
  sensoryPopup.classList.add('visible');
}

function buildSensoryPopup() {
  var popup = el('div', { className: 'sensory-popup' });

  popup.appendChild(el('div', { className: 'sensory-popup-title', text: 'Sensory Palette' }));

  var grid = el('div', { className: 'sensory-grid' });

  /* Header row */
  grid.appendChild(el('div', { className: 'sensory-header' }));
  SESSIONS.forEach(function(s) {
    grid.appendChild(el('div', {
      className: 'sensory-header',
      style: { color: s.color }
    }, ['S' + s.id]));
  });

  var senses = ['sight', 'sound', 'touch', 'smell', 'taste'];
  var senseColors = {
    sight: '#7ba4c7', sound: '#9b7ed4', touch: '#6b9e7a',
    smell: '#d4a05a', taste: '#e06f6f'
  };
  var sessionPhase = ['early', 'early', 'middle', 'middle', 'late'];
  /* Refined intensity per session */
  var phaseIntensity = [0.2, 0.35, 0.55, 0.65, 0.5];

  senses.forEach(function(sense) {
    grid.appendChild(el('div', {
      className: 'sensory-label',
      style: { color: senseColors[sense] }
    }, [sense]));

    SESSIONS.forEach(function(s, si) {
      var phase = sessionPhase[si];
      var text = SENSORY[sense][phase];
      var short = text.length > 32 ? text.substring(0, 30) + '\u2026' : text;
      var baseColor = senseColors[sense];
      var cell = el('div', {
        className: 'sensory-cell',
        style: {
          backgroundColor: baseColor,
          opacity: String(0.35 + phaseIntensity[si] * 0.65)
        },
        title: text
      }, [short]);
      cell.addEventListener('click', function() {
        showSensorySidebar(sense, phase, text, s);
      });
      grid.appendChild(cell);
    });
  });

  popup.appendChild(grid);
  return popup;
}

function showActSidebar(s, a, actIndex) {

  sidebar.appendChild(sec1);

  /* Duration bar */
  var totalDuration = s.acts.reduce(function(sum, act) { return sum + act.duration; }, 0);
  var pct = Math.round((a.duration / totalDuration) * 100);
  var sec1b = el('div', { className: 'sidebar-section' });
  sec1b.appendChild(el('div', { className: 'sidebar-section-title', text: 'Duration' }));

    [a.duration + ' min (' + pct + '% of session)']));

  var sec2 = el('div', { className: 'sidebar-section' });
  sec2.appendChild(el('div', { className: 'sidebar-section-title', text: 'Beats (' + a.beats.length + ')' }));
  a.beats.forEach(function(b) {
    sec2.appendChild(el('div', { className: 'sidebar-beat' }, [b]));

  sidebar.appendChild(sec2);

  /* Threads touching this act */
  var touchThreads = THREADS.filter(function(t) {

  link.addEventListener('click', function() { showSessionSidebar(s); });
  sidebar.appendChild(link);
}

function showSensorySidebar(sense, phase, text, session) {
  clearEl(sidebar);

  var senseColors = {
    sight: '#7ba4c7', sound: '#9b7ed4', touch: '#6b9e7a',
    smell: '#d4a05a', taste: '#e06f6f'
  };
  var color = senseColors[sense];

  sidebar.appendChild(el('div', { className: 'sidebar-title', style: { color: color } },
    [sense.charAt(0).toUpperCase() + sense.slice(1)]));
  sidebar.appendChild(el('div', { className: 'sidebar-subtitle' },
    ['Sensory Phase: ' + phase + ' \u00b7 S' + session.id + ': ' + session.name]));

  /* Current text */
  var sec1 = el('div', { className: 'sidebar-section' });
  sec1.appendChild(el('div', { className: 'sidebar-section-title', text: 'Description' }));
  sec1.appendChild(el('div', { className: 'sidebar-text' }, [text]));
  sidebar.appendChild(sec1);

  /* Full progression */
  var sec2 = el('div', { className: 'sidebar-section' });
  sec2.appendChild(el('div', { className: 'sidebar-section-title', text: 'Full Progression' }));

  ['early', 'middle', 'late'].forEach(function(p) {
    var phaseEl = el('div', { style: {
      padding: '8px 10px', marginBottom: '6px', borderRadius: '4px',
      borderLeft: '3px solid ' + color,
      background: p === phase ? color + '15' : 'transparent'
    }});
    phaseEl.appendChild(el('div', { style: {
      fontSize: '10px', color: color, textTransform: 'uppercase',
      letterSpacing: '1px', marginBottom: '3px'
    }}, [p + (p === 'early' ? ' (S0\u2013S1)' : p === 'middle' ? ' (S2\u2013S3)' : ' (S4)')]));
    phaseEl.appendChild(el('div', { style: { fontSize: '11px', color: '#8a9aa0', lineHeight: '1.6' } },
      [SENSORY[sense][p]]));
    sec2.appendChild(phaseEl);
  });
  sidebar.appendChild(sec2);

  /* Other senses at this phase */
  var sec3 = el('div', { className: 'sidebar-section' });
  sec3.appendChild(el('div', { className: 'sidebar-section-title', text: 'Other Senses (' + phase + ')' }));
  var senses = ['sight', 'sound', 'touch', 'smell', 'taste'];
  senses.forEach(function(s) {
    if (s === sense) return;
    var otherEl = el('div', { style: {
      fontSize: '10px', padding: '4px 0', color: senseColors[s], cursor: 'pointer'
    }}, [s + ': ' + SENSORY[s][phase]]);
    otherEl.addEventListener('click', function() {
      showSensorySidebar(s, phase, SENSORY[s][phase], session);
    });
    sec3.appendChild(otherEl);
  });
  sidebar.appendChild(sec3);
}

/* ── Resize Handler ── */
var resizeTimer;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(render, 100);
});

/* ── Initial Render ── */
render();

</script>
</body>
</html>
