<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ceremony — Codebase Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e17;
    color: #e8dcc8;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  header {
    background: #0d1220;
    border-bottom: 1px solid #1e2d44;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    z-index: 10;
    position: relative;
  }

  header h1 {
    font-family: 'Crimson Text', serif;
    font-size: 22px;
    font-weight: 600;
    color: #c4a35a;
    letter-spacing: 1px;
  }

  header h1 span {
    color: #6a6a7a;
    font-weight: 400;
    font-size: 16px;
    margin-left: 12px;
  }

  #controls {
    background: #0d1220;
    border-bottom: 1px solid #1e2d44;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    z-index: 10;
    position: relative;
  }

  .view-toggle {
    display: flex;
    background: #131a2b;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #1e2d44;
  }

  .view-toggle button {
    background: transparent;
    border: none;
    color: #6a7a8a;
    padding: 6px 16px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .view-toggle button.active {
    background: #1e2d44;
    color: #c4a35a;
  }

  .view-toggle button:hover:not(.active) {
    color: #e8dcc8;
  }

  .category-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .cat-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid #1e2d44;
    background: #131a2b;
    color: #e8dcc8;
    transition: all 0.2s;
    user-select: none;
  }

  .cat-chip.hidden {
    opacity: 0.35;
    border-color: transparent;
  }

  .cat-chip .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  #search-box {
    background: #131a2b;
    border: 1px solid #1e2d44;
    border-radius: 6px;
    padding: 6px 12px;
    color: #e8dcc8;
    font-family: inherit;
    font-size: 12px;
    width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search-box:focus {
    border-color: #c4a35a;
  }

  #search-box::placeholder {
    color: #4a5568;
  }

  #reset-btn {
    background: transparent;
    border: 1px solid #1e2d44;
    border-radius: 6px;
    padding: 6px 12px;
    color: #6a7a8a;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  #reset-btn:hover {
    color: #e8dcc8;
    border-color: #c4a35a;
  }

  .stats {
    margin-left: auto;
    font-size: 11px;
    color: #4a5568;
  }

  #main {
    display: flex;
    height: calc(100vh - 56px - 46px);
    position: relative;
  }

  #graph-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #graph {
    width: 100%;
    height: 100%;
  }

  .hull {
    fill-opacity: 0.04;
    stroke-opacity: 0.15;
    stroke-width: 1.5;
    stroke-dasharray: 4 3;
  }

  .link {
    fill: none;
    stroke-opacity: 0.12;
    transition: stroke-opacity 0.2s;
  }

  .link.highlighted {
    stroke-opacity: 0.7;
  }

  .link.dimmed {
    stroke-opacity: 0.03;
  }

  .link.dashed {
    stroke-dasharray: 6 4;
  }

  .node-circle {
    stroke-width: 1.5;
    cursor: pointer;
    transition: stroke-width 0.15s;
  }

  .node-circle.selected {
    stroke-width: 3;
    stroke: #c4a35a !important;
  }

  .node-circle.dimmed {
    opacity: 0.08;
  }

  .node-label {
    fill: #e8dcc8;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: central;
    opacity: 0.85;
  }

  .node-label.dimmed {
    opacity: 0.06;
  }

  .tooltip {
    position: absolute;
    background: #1a2236;
    border: 1px solid #2a3a54;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    z-index: 100;
    max-width: 320px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .tooltip.visible { opacity: 1; }

  .tt-name {
    font-weight: 500;
    color: #c4a35a;
    margin-bottom: 4px;
  }

  .tt-cat {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 6px;
  }

  .tt-lines {
    color: #6a7a8a;
    font-size: 11px;
  }

  .tt-desc {
    color: #a8b8c8;
    font-size: 11px;
    margin-top: 4px;
    line-height: 1.4;
  }

  /* Sidebar */
  #sidebar {
    width: 340px;
    background: #0d1220;
    border-left: 1px solid #1e2d44;
    overflow-y: auto;
    padding: 0;
    transition: transform 0.3s;
    flex-shrink: 0;
  }

  .sidebar-empty {
    padding: 32px 20px;
    color: #4a5568;
    font-size: 12px;
    text-align: center;
    line-height: 1.6;
  }

  .sidebar-content {
    padding: 20px;
  }

  .sb-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .sb-name {
    font-size: 16px;
    font-weight: 500;
    color: #e8dcc8;
    word-break: break-all;
  }

  .sb-close {
    background: transparent;
    border: none;
    color: #4a5568;
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
    line-height: 1;
  }

  .sb-close:hover { color: #e8dcc8; }

  .sb-badge {
    display: inline-block;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .sb-path {
    font-size: 11px;
    color: #4a5568;
    margin-bottom: 16px;
    word-break: break-all;
  }

  .sb-section {
    margin-bottom: 16px;
  }

  .sb-section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #4a5568;
    margin-bottom: 8px;
  }

  .sb-lines-bar {
    height: 6px;
    background: #131a2b;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 4px;
  }

  .sb-lines-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }

  .sb-lines-label {
    font-size: 22px;
    font-weight: 500;
    color: #e8dcc8;
  }

  .sb-lines-unit {
    font-size: 11px;
    color: #4a5568;
    margin-left: 4px;
  }

  .sb-desc {
    font-size: 12px;
    color: #a8b8c8;
    line-height: 1.5;
  }

  .sb-link-list {
    list-style: none;
  }

  .sb-link-list li {
    padding: 4px 0;
  }

  .sb-link-list a {
    color: #7ba4c7;
    text-decoration: none;
    font-size: 12px;
    cursor: pointer;
    transition: color 0.15s;
  }

  .sb-link-list a:hover {
    color: #c4a35a;
  }

  .sb-link-list .arrow {
    color: #2a3a54;
    margin-right: 4px;
    font-size: 10px;
  }

  /* Legend */
  #legend-toggle {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: #131a2b;
    border: 1px solid #1e2d44;
    border-radius: 6px;
    padding: 6px 12px;
    color: #6a7a8a;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    z-index: 5;
  }

  #legend-toggle:hover { color: #e8dcc8; }

  #legend {
    position: absolute;
    bottom: 48px;
    left: 16px;
    background: #131a2bee;
    border: 1px solid #1e2d44;
    border-radius: 8px;
    padding: 14px 18px;
    z-index: 5;
    font-size: 11px;
    display: none;
  }

  #legend.visible { display: block; }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    display: inline-block;
  }

  .legend-label { color: #a8b8c8; }

  /* Arrow marker */
  marker path {
    fill: #4a5568;
  }

  /* Tree-specific */
  .tree-link {
    fill: none;
    stroke: #1e2d44;
    stroke-width: 1;
  }

  .tree-arc {
    fill: none;
    stroke-opacity: 0.2;
    stroke-width: 1;
  }
</style>
</head>

// SAFE DOM HELPERS
// ─────────────────────────────────────────

function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) {
    Object.entries(attrs).forEach(function(kv) {
      var k = kv[0], v = kv[1];
      if (k === 'text') e.textContent = v;
      else if (k === 'className') e.className = v;
      else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
      else e.setAttribute(k, v);
    });
  }
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(function(c) {
      if (typeof c === 'string') e.appendChild(document.createTextNode(c));
      else if (c) e.appendChild(c);
    });
  }
  return e;
}

// GRAPH ENGINE
// ─────────────────────────────────────────

function getWidth() { return document.getElementById('graph-container').clientWidth; }
function getHeight() { return document.getElementById('graph-container').clientHeight; }

var currentView = 'constellation';
var selectedNode = null;
var hiddenCategories = new Set();
var searchQuery = '';
var simulation;
var legendVisible = false;

// Build index maps
var nodeMap = {};
nodes.forEach(function(n) { nodeMap[n.id] = n; });

// Compute imports/imported-by
var importsOf = {};
var importedBy = {};
nodes.forEach(function(n) { importsOf[n.id] = []; importedBy[n.id] = []; });
edges.forEach(function(e) {
  if (!importsOf[e.source]) importsOf[e.source] = [];
  if (!importedBy[e.target]) importedBy[e.target] = [];
  importsOf[e.source].push(e.target);
  importedBy[e.target].push(e.source);
});

var maxLines = Math.max.apply(null, nodes.map(function(n) { return n.lines; }));

function nodeRadius(d) {
  return Math.max(6, Math.sqrt(d.lines) * 1.1);
}

// ─────────────────────────────────────────
// SETUP SVG
// ─────────────────────────────────────────

var svg = d3.select('#graph');
var graphContainer = svg.append('g').attr('class', 'zoom-container');

var zoom = d3.zoom()
  .scaleExtent([0.2, 4])
  .on('zoom', function(event) {
    graphContainer.attr('transform', event.transform);
  });

svg.call(zoom);

// Arrow marker
svg.append('defs').append('marker')
  .attr('id', 'arrow')
  .attr('viewBox', '0 -5 10 10')
  .attr('refX', 20)
  .attr('refY', 0)
  .attr('markerWidth', 6)
  .attr('markerHeight', 6)
  .attr('orient', 'auto')
  .append('path')
  .attr('d', 'M0,-4L10,0L0,4')
  .attr('fill', '#4a5568');

// Layers
var hullLayer = graphContainer.append('g').attr('class', 'hulls');
var linkLayer = graphContainer.append('g').attr('class', 'links');
var nodeLayer = graphContainer.append('g').attr('class', 'nodes');
var labelLayer = graphContainer.append('g').attr('class', 'labels');

// Tree layers (hidden initially)
var treeLinkLayer = graphContainer.append('g').attr('class', 'tree-links').style('display', 'none');
var treeArcLayer = graphContainer.append('g').attr('class', 'tree-arcs').style('display', 'none');

// ─────────────────────────────────────────
// CONSTELLATION VIEW
// ─────────────────────────────────────────

// Folder cluster centers
var folderKeys = Object.keys(FOLDERS);
var clusterCenters = {};
var angleStep = (2 * Math.PI) / folderKeys.length;
folderKeys.forEach(function(key, i) {
  var angle = angleStep * i - Math.PI / 2;
  var r = 280;
  clusterCenters[key] = { x: r * Math.cos(angle), y: r * Math.sin(angle) };
});

// Initialize node positions near their cluster
nodes.forEach(function(n) {
  var c = clusterCenters[n.folder] || { x: 0, y: 0 };
  n.x = c.x + (Math.random() - 0.5) * 80;
  n.y = c.y + (Math.random() - 0.5) * 80;
});

// Build link data
var linkData = edges.map(function(e) {
  return { source: e.source, target: e.target, dashed: e.dashed || false };
});

// Force simulation
simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(linkData).id(function(d) { return d.id; }).distance(60).strength(0.3))
  .force('charge', d3.forceManyBody().strength(-160))
  .force('center', d3.forceCenter(0, 0).strength(0.06))
  .force('collide', d3.forceCollide().radius(function(d) { return nodeRadius(d) + 6; }))
  .force('cluster', clusterForce(0.12))
  .on('tick', ticked);

function clusterForce(strength) {
  return function(alpha) {
    nodes.forEach(function(n) {
      var c = clusterCenters[n.folder];
      if (c) {
        n.vx += (c.x - n.x) * strength * alpha;
        n.vy += (c.y - n.y) * strength * alpha;
      }
    });
  };
}

// Draw links
var links = linkLayer.selectAll('line')
  .data(linkData)
  .join('line')
  .attr('class', function(d) { return 'link' + (d.dashed ? ' dashed' : ''); })
  .attr('stroke', function(d) {
    var sNode = nodeMap[typeof d.source === 'object' ? d.source.id : d.source];
    return sNode ? CATEGORIES[sNode.category].color : '#4a5568';
  })
  .attr('stroke-width', 1)
  .attr('marker-end', 'url(#arrow)');

// Draw nodes
var nodeCircles = nodeLayer.selectAll('circle')
  .data(nodes)
  .join('circle')
  .attr('class', 'node-circle')
  .attr('r', function(d) { return nodeRadius(d); })
  .attr('fill', function(d) { return CATEGORIES[d.category].color; })
  .attr('stroke', function(d) { return d3.color(CATEGORIES[d.category].color).darker(0.5); })
  .on('mouseenter', onNodeHover)
  .on('mouseleave', onNodeLeave)
  .on('click', onNodeClick)
  .call(d3.drag()
    .on('start', dragStart)
    .on('drag', dragging)
    .on('end', dragEnd));

// Draw labels
var labels = labelLayer.selectAll('text')
  .data(nodes)
  .join('text')
  .attr('class', 'node-label')
  .text(function(d) { return d.name.replace(/\.(tsx?|json|md|cjs|js)$/, ''); })
  .style('font-size', function(d) { return d.lines > 150 ? '10px' : '8px'; })
  .style('opacity', function(d) { return d.lines > 80 ? 0.85 : 0; });

function ticked() {
  links
    .attr('x1', function(d) { return d.source.x; })
    .attr('y1', function(d) { return d.source.y; })
    .attr('x2', function(d) {
      var r = nodeRadius(d.target);
      var dx = d.target.x - d.source.x;
      var dy = d.target.y - d.source.y;
      var dist = Math.sqrt(dx*dx + dy*dy) || 1;
      return d.target.x - (dx / dist) * r;
    })
    .attr('y2', function(d) {
      var r = nodeRadius(d.target);
      var dx = d.target.x - d.source.x;
      var dy = d.target.y - d.source.y;
      var dist = Math.sqrt(dx*dx + dy*dy) || 1;
      return d.target.y - (dy / dist) * r;
    });

  nodeCircles
    .attr('cx', function(d) { return d.x; })
    .attr('cy', function(d) { return d.y; });

  labels
    .attr('x', function(d) { return d.x; })
    .attr('y', function(d) { return d.y - nodeRadius(d) - 6; });

  drawHulls();
}

// ─────────────────────────────────────────
// CONVEX HULLS
// ─────────────────────────────────────────

function drawHulls() {
  var folderGroups = {};
  nodes.forEach(function(n) {
    if (isNodeVisible(n)) {
      if (!folderGroups[n.folder]) folderGroups[n.folder] = [];
      folderGroups[n.folder].push([n.x, n.y]);
    }
  });

  var hullData = Object.entries(folderGroups)
    .filter(function(entry) { return entry[1].length >= 3; })
    .map(function(entry) {
      var folder = entry[0], pts = entry[1];
      var padded = [];
      pts.forEach(function(pt) {
        var pad = 25;
        padded.push([pt[0] - pad, pt[1] - pad]);
        padded.push([pt[0] + pad, pt[1] - pad]);
        padded.push([pt[0] - pad, pt[1] + pad]);
        padded.push([pt[0] + pad, pt[1] + pad]);
      });
      return { folder: folder, hull: d3.polygonHull(padded) };
    })
    .filter(function(d) { return d.hull; });

  var hulls = hullLayer.selectAll('path')
    .data(hullData, function(d) { return d.folder; });

  hulls.exit().remove();

  hulls.enter().append('path')
    .attr('class', 'hull')
    .merge(hulls)
    .attr('d', function(d) { return 'M' + d.hull.join('L') + 'Z'; })
    .attr('fill', function(d) { return (FOLDERS[d.folder] || {}).color || '#4a5568'; })
    .attr('stroke', function(d) { return (FOLDERS[d.folder] || {}).color || '#4a5568'; });
}

var tooltipEl = document.getElementById('tooltip');

function onNodeHover(event, d) {
  if (!isNodeVisible(d)) return;

  // Build tooltip using safe DOM methods
  var cat = CATEGORIES[d.category];
  clearEl(tooltipEl);

  var nameDiv = el('div', { className: 'tt-name', text: d.name });
  var catSpan = el('span', { className: 'tt-cat', text: cat.label });
  catSpan.style.background = cat.color + '22';
  catSpan.style.color = cat.color;
  var linesDiv = el('div', { className: 'tt-lines', text: d.lines + ' lines' });
  var descDiv = el('div', { className: 'tt-desc', text: d.description.split('.')[0] + '.' });

  tooltipEl.appendChild(nameDiv);
  tooltipEl.appendChild(catSpan);
  tooltipEl.appendChild(linesDiv);
  tooltipEl.appendChild(descDiv);

  tooltipEl.classList.add('visible');

  var rect = document.getElementById('graph-container').getBoundingClientRect();
  tooltipEl.style.left = (event.clientX - rect.left + 16) + 'px';
  tooltipEl.style.top = (event.clientY - rect.top - 10) + 'px';

  // Clamp tooltip within view
  var ttRect = tooltipEl.getBoundingClientRect();
  if (ttRect.right > rect.right - 10) {
    tooltipEl.style.left = (event.clientX - rect.left - ttRect.width - 16) + 'px';
  }
  if (ttRect.bottom > rect.bottom - 10) {
    tooltipEl.style.top = (event.clientY - rect.top - ttRect.height - 10) + 'px';
  }

  // Highlight connected edges + neighbors
  if (!selectedNode) {
    highlightConnections(d);
  }
}

function onNodeLeave() {
  tooltipEl.classList.remove('visible');
  if (!selectedNode) {
    clearHighlights();
  }
}

function onNodeClick(event, d) {
  event.stopPropagation();

  if (selectedNode === d.id) {
    selectedNode = null;
    clearHighlights();
    showEmptySidebar();
    return;
  }

  selectedNode = d.id;
  highlightConnections(d);
  showSidebar(d);

  nodeCircles.classed('selected', function(n) { return n.id === d.id; });
}

function highlightConnections(d) {
  var connected = new Set([d.id]);
  (importsOf[d.id] || []).forEach(function(id) { connected.add(id); });
  (importedBy[d.id] || []).forEach(function(id) { connected.add(id); });

  nodeCircles.classed('dimmed', function(n) { return !connected.has(n.id) && isNodeVisible(n); });
  labels.classed('dimmed', function(n) { return !connected.has(n.id) && isNodeVisible(n); });

  links
    .classed('highlighted', function(l) {
      var sid = typeof l.source === 'object' ? l.source.id : l.source;
      var tid = typeof l.target === 'object' ? l.target.id : l.target;
      return sid === d.id || tid === d.id;
    })
    .classed('dimmed', function(l) {
      var sid = typeof l.source === 'object' ? l.source.id : l.source;
      var tid = typeof l.target === 'object' ? l.target.id : l.target;
      return sid !== d.id && tid !== d.id;
    });
}

function clearHighlights() {
  nodeCircles.classed('dimmed', false).classed('selected', false);
  labels.classed('dimmed', false);
  links.classed('highlighted', false).classed('dimmed', false);
  applyFilters();
}

// ─────────────────────────────────────────

function dragStart(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}

function dragging(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}

function dragEnd(event, d) {
  if (!event.active) simulation.alphaTarget(0);
}

function showEmptySidebar() {

function showSidebar(d) {
  var sidebar = document.getElementById('sidebar');
  clearEl(sidebar);

  var cat = CATEGORIES[d.category];
  var imports = importsOf[d.id] || [];
  var importers = importedBy[d.id] || [];
  var linesPct = Math.round((d.lines / maxLines) * 100);

  var content = el('div', { className: 'sidebar-content' });

  // Header
  var header = el('div', { className: 'sb-header' }, [
    el('div', { className: 'sb-name', text: d.name }),
    el('button', { className: 'sb-close', text: '\u00d7', onclick: function() { closeSidebar(); } })
  ]);
  content.appendChild(header);

  // Badge
  var badge = el('span', { className: 'sb-badge', text: cat.label });
  badge.style.background = cat.color + '22';
  badge.style.color = cat.color;
  content.appendChild(badge);

  // Path
  content.appendChild(el('div', { className: 'sb-path', text: d.path }));

  // Lines section
  var linesSection = el('div', { className: 'sb-section' }, [
    el('div', { className: 'sb-section-title', text: 'Lines of code' }),
  ]);
  var linesLabel = el('span', { className: 'sb-lines-label', text: String(d.lines) });
  var linesUnit = el('span', { className: 'sb-lines-unit', text: 'lines' });
  linesSection.appendChild(linesLabel);
  linesSection.appendChild(linesUnit);
  var bar = el('div', { className: 'sb-lines-bar' });
  var fill = el('div', { className: 'sb-lines-fill' });
  fill.style.width = linesPct + '%';
  fill.style.background = cat.color;
  bar.appendChild(fill);
  linesSection.appendChild(bar);
  content.appendChild(linesSection);

  // Role section
  content.appendChild(el('div', { className: 'sb-section' }, [
    el('div', { className: 'sb-section-title', text: 'Role' }),
    el('div', { className: 'sb-desc', text: d.description })
  ]));

  // Imports section
  if (imports.length > 0) {
    var importsSection = el('div', { className: 'sb-section' }, [
      el('div', { className: 'sb-section-title', text: 'Imports (' + imports.length + ')' })
    ]);
    var importsList = el('ul', { className: 'sb-link-list' });
    imports.forEach(function(id) {
      var n = nodeMap[id];
      var li = el('li');
      var arrow = el('span', { className: 'arrow', text: '\u2192 ' });
      var link = el('a', { text: n ? n.name : id });
      link.addEventListener('click', function() { selectNodeById(id); });
      li.appendChild(arrow);
      li.appendChild(link);
      importsList.appendChild(li);
    });
    importsSection.appendChild(importsList);
    content.appendChild(importsSection);
  }

  // Imported by section
  if (importers.length > 0) {
    var importersSection = el('div', { className: 'sb-section' }, [
      el('div', { className: 'sb-section-title', text: 'Imported by (' + importers.length + ')' })
    ]);
    var importersList = el('ul', { className: 'sb-link-list' });
    importers.forEach(function(id) {
      var n = nodeMap[id];
      var li = el('li');
      var arrow = el('span', { className: 'arrow', text: '\u2190 ' });
      var link = el('a', { text: n ? n.name : id });
      link.addEventListener('click', function() { selectNodeById(id); });
      li.appendChild(arrow);
      li.appendChild(link);
      importersList.appendChild(li);
    });
    importersSection.appendChild(importersList);
    content.appendChild(importersSection);
  }

  sidebar.appendChild(content);
}

function closeSidebar() {
  selectedNode = null;
  clearHighlights();
  showEmptySidebar();
}

function selectNodeById(id) {
  var node = nodes.find(function(n) { return n.id === id; });
  if (node) {
    selectedNode = id;
    highlightConnections(node);
    showSidebar(node);
    nodeCircles.classed('selected', function(n) { return n.id === id; });

    // Pan to node
    var transform = d3.zoomTransform(svg.node());
    var tx = -node.x * transform.k + getWidth() / 2;
    var ty = -node.y * transform.k + getHeight() / 2;
    svg.transition().duration(500)
      .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(transform.k));
  }
}

// ─────────────────────────────────────────
// SEARCH & FILTERS
// ─────────────────────────────────────────

function isNodeVisible(d) {
  if (hiddenCategories.has(d.category)) return false;
  if (searchQuery && d.name.toLowerCase().indexOf(searchQuery) === -1 &&
      d.path.toLowerCase().indexOf(searchQuery) === -1 &&
      d.description.toLowerCase().indexOf(searchQuery) === -1) return false;
  return true;
}

function applyFilters() {
  nodeCircles
    .style('opacity', function(d) { return isNodeVisible(d) ? 1 : 0.06; })
    .style('pointer-events', function(d) { return isNodeVisible(d) ? 'all' : 'none'; });

  labels
    .style('opacity', function(d) {
      if (!isNodeVisible(d)) return 0;
      return d.lines > 80 ? 0.85 : 0;
    });

  links
    .style('opacity', function(l) {
      var sid = typeof l.source === 'object' ? l.source.id : l.source;
      var tid = typeof l.target === 'object' ? l.target.id : l.target;
      var sNode = nodeMap[sid];
      var tNode = nodeMap[tid];
      if (!sNode || !tNode) return 0;
      return (isNodeVisible(sNode) && isNodeVisible(tNode)) ? null : 0.02;
    });

  updateStats();
}

function onSearch(query) {
  searchQuery = query.toLowerCase().trim();
  if (selectedNode && !isNodeVisible(nodeMap[selectedNode])) {
    selectedNode = null;
    clearHighlights();
    showEmptySidebar();
  }
  applyFilters();
  drawHulls();
}

function toggleCategory(cat) {
  if (hiddenCategories.has(cat)) {
    hiddenCategories.delete(cat);
  } else {
    hiddenCategories.add(cat);
  }
  renderCategoryChips();
  applyFilters();
  drawHulls();
}

function renderCategoryChips() {
  var container = document.getElementById('cat-filters');
  clearEl(container);
  Object.entries(CATEGORIES).forEach(function(entry) {
    var key = entry[0], val = entry[1];
    var hidden = hiddenCategories.has(key);
    var chip = el('div', { className: 'cat-chip' + (hidden ? ' hidden' : '') });
    var dot = el('span', { className: 'dot' });
    dot.style.background = val.color;
    chip.appendChild(dot);
    chip.appendChild(document.createTextNode(val.label));
    chip.addEventListener('click', function() { toggleCategory(key); });
    container.appendChild(chip);
  });
}

function resetAll() {
  searchQuery = '';
  document.getElementById('search-box').value = '';
  hiddenCategories.clear();
  selectedNode = null;
  renderCategoryChips();
  clearHighlights();
  showEmptySidebar();
  applyFilters();

  // Unpin all
  nodes.forEach(function(n) { n.fx = null; n.fy = null; });
  simulation.alpha(0.5).restart();

  // Reset zoom
  svg.transition().duration(500)
    .call(zoom.transform, d3.zoomIdentity.translate(getWidth() / 2, getHeight() / 2).scale(0.72));
}

function updateStats() {
  var visible = nodes.filter(isNodeVisible);
  var totalLines = visible.reduce(function(s, n) { return s + n.lines; }, 0);
  document.getElementById('stats').textContent =
    visible.length + ' files \u00b7 ' + totalLines.toLocaleString() + ' lines';
}

// ─────────────────────────────────────────
// LEGEND
// ─────────────────────────────────────────

function toggleLegend() {
  legendVisible = !legendVisible;
  document.getElementById('legend').classList.toggle('visible', legendVisible);
}

function renderLegend() {
  var legendEl = document.getElementById('legend');
  clearEl(legendEl);
  Object.entries(CATEGORIES).forEach(function(entry) {
    var val = entry[1];
    var item = el('div', { className: 'legend-item' });
    var dot = el('span', { className: 'legend-dot' });
    dot.style.background = val.color;
    item.appendChild(dot);
    item.appendChild(el('span', { className: 'legend-label', text: val.label }));
    legendEl.appendChild(item);
  });
  var edgeItem = el('div', { className: 'legend-item' });
  edgeItem.style.marginTop = '8px';
  edgeItem.style.paddingTop = '8px';
  edgeItem.style.borderTop = '1px solid #1e2d44';
  var edgeLabel = el('span', { text: '\u2500\u2500 import   \u2504\u2504 HTTP/FS' });
  edgeLabel.style.color = '#4a5568';
  edgeLabel.style.fontSize = '10px';
  edgeItem.appendChild(edgeLabel);
  legendEl.appendChild(edgeItem);
}

// ─────────────────────────────────────────
// TREE VIEW
// ─────────────────────────────────────────

function buildTree() {
  var root = { name: 'story-game', children: [] };
  var folderNodes = {};

  Object.entries(FOLDERS).forEach(function(entry) {
    var key = entry[0], val = entry[1];
    var fNode = { name: val.label, children: [], _folder: key };
    folderNodes[key] = fNode;
    root.children.push(fNode);
  });

  nodes.forEach(function(n) {
    var fn = folderNodes[n.folder];
    if (fn) {
      fn.children.push({ name: n.name, _data: n, children: [] });
    }
  });

  // Remove empty
  root.children = root.children.filter(function(c) { return c.children.length > 0; });

  return d3.hierarchy(root);
}

var treePositions = {};

function computeTreeLayout() {
  var hierarchy = buildTree();
  var radius = Math.min(getWidth(), getHeight()) * 0.38;

  var tree = d3.tree()
    .size([2 * Math.PI, radius])
    .separation(function(a, b) { return (a.parent === b.parent ? 1 : 2) / a.depth; });

  tree(hierarchy);

  treePositions = {};
  hierarchy.descendants().forEach(function(d) {
    if (d.data._data) {
      var angle = d.x;
      var r = d.y;
      treePositions[d.data._data.id] = {
        x: r * Math.cos(angle - Math.PI / 2),
        y: r * Math.sin(angle - Math.PI / 2),
      };
    }
  });

  return hierarchy;
}

function setView(view) {
  if (view === currentView) return;
  currentView = view;

  document.getElementById('btn-constellation').classList.toggle('active', view === 'constellation');
  document.getElementById('btn-tree').classList.toggle('active', view === 'tree');

  if (view === 'tree') {
    enterTreeView();
  } else {
    enterConstellationView();
  }
}

function enterTreeView() {
  simulation.stop();

  var hierarchy = computeTreeLayout();

  // Animate nodes to tree positions
  nodes.forEach(function(n) {
    var pos = treePositions[n.id];
    if (pos) {
      n._targetX = pos.x;
      n._targetY = pos.y;
      n._startX = n.x;
      n._startY = n.y;
    }
  });

  // Build tree links
  var treeLinks = [];
  hierarchy.links().forEach(function(link) {
    var sx = link.source.y * Math.cos(link.source.x - Math.PI / 2);
    var sy = link.source.y * Math.sin(link.source.x - Math.PI / 2);
    var tx = link.target.y * Math.cos(link.target.x - Math.PI / 2);
    var ty = link.target.y * Math.sin(link.target.x - Math.PI / 2);
    treeLinks.push({ x1: sx, y1: sy, x2: tx, y2: ty });
  });

  // Animate transition
  var duration = 800;
  var t = d3.timer(function(elapsed) {
    var progress = Math.min(1, elapsed / duration);
    var ease = d3.easeCubicInOut(progress);

    nodes.forEach(function(n) {
      if (n._targetX !== undefined) {
        n.x = n._startX + (n._targetX - n._startX) * ease;
        n.y = n._startY + (n._targetY - n._startY) * ease;
      }
    });

    nodeCircles.attr('cx', function(d) { return d.x; }).attr('cy', function(d) { return d.y; });
    labels.attr('x', function(d) { return d.x; }).attr('y', function(d) { return d.y - nodeRadius(d) - 6; });

    // Fade out constellation links
    links.style('opacity', 1 - ease);
    hullLayer.style('opacity', 1 - ease);

    if (progress >= 1) {
      t.stop();

      links.style('display', 'none');
      hullLayer.style('display', 'none');

      // Show tree links
      treeLinkLayer.style('display', null);
      treeLinkLayer.selectAll('line').remove();
      treeLinkLayer.selectAll('line')
        .data(treeLinks)
        .join('line')
        .attr('class', 'tree-link')
        .attr('x1', function(d) { return d.x1; }).attr('y1', function(d) { return d.y1; })
        .attr('x2', function(d) { return d.x2; }).attr('y2', function(d) { return d.y2; })
        .style('opacity', 0)
        .transition().duration(300)
        .style('opacity', 1);

      // Show import arcs
      treeArcLayer.style('display', null);
      treeArcLayer.selectAll('path').remove();
      var arcData = edges.filter(function(e) {
        return treePositions[e.source] && treePositions[e.target];
      });

      treeArcLayer.selectAll('path')
        .data(arcData)
        .join('path')
        .attr('class', 'tree-arc')
        .attr('d', function(e) {
          var s = treePositions[e.source];
          var t = treePositions[e.target];
          var dx = t.x - s.x;
          var dy = t.y - s.y;
          var dr = Math.sqrt(dx * dx + dy * dy) * 1.5;
          return 'M' + s.x + ',' + s.y + 'A' + dr + ',' + dr + ' 0 0,1 ' + t.x + ',' + t.y;
        })
        .attr('stroke', function(e) {
          var sNode = nodeMap[e.source];
          return sNode ? CATEGORIES[sNode.category].color : '#4a5568';
        })
        .style('opacity', 0)
        .transition().duration(300)
        .style('opacity', 0.15);
    }
  });
}

function enterConstellationView() {
  // Hide tree elements
  treeLinkLayer.style('display', 'none');
  treeArcLayer.style('display', 'none');

  // Show constellation elements
  links.style('display', null);
  hullLayer.style('display', null);

  // Unpin and restart
  nodes.forEach(function(n) { n.fx = null; n.fy = null; });

  links.style('opacity', 0);
  hullLayer.style('opacity', 0);

  simulation.alpha(0.5).restart();

  // Fade in
  var duration = 800;
  links.transition().duration(duration).style('opacity', null);
  hullLayer.transition().duration(duration).style('opacity', null);
}

// ─────────────────────────────────────────
// EVENT LISTENERS
// ─────────────────────────────────────────

svg.on('click', function() {
  if (selectedNode) {
    selectedNode = null;
    clearHighlights();
    showEmptySidebar();
  }
});

document.getElementById('btn-constellation').addEventListener('click', function() { setView('constellation'); });
document.getElementById('btn-tree').addEventListener('click', function() { setView('tree'); });
document.getElementById('search-box').addEventListener('input', function() { onSearch(this.value); });
document.getElementById('reset-btn').addEventListener('click', resetAll);
document.getElementById('legend-toggle').addEventListener('click', toggleLegend);

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────

renderCategoryChips();
renderLegend();
updateStats();

// Initial zoom to fit
setTimeout(function() {
  var w = getWidth();
  var h = getHeight();
  svg.call(zoom.transform, d3.zoomIdentity.translate(w / 2, h / 2).scale(0.72));
}, 100);

// Handle resize
window.addEventListener('resize', function() {
  if (currentView === 'constellation') {
    simulation.alpha(0.1).restart();
  }
});
</script>
