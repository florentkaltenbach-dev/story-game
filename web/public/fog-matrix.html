<!-- VIZ-META {"title":"Knowledge Fog Matrix","description":"Player × secrets revelation heatmap","category":"visualization"} -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ceremony — Knowledge Fog Matrix</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="/the-ceremony/js/ceremony-data.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e17;
    color: #e8dcc8;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #0d1220;
    border-bottom: 1px solid #1e2d44;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    z-index: 10;
    position: relative;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Crimson Text', serif;
    font-size: 22px;
    font-weight: 600;
    color: #c4a35a;
    letter-spacing: 1px;
  }

  header h1 span {
    color: #6a6a7a;
    font-weight: 400;
    font-size: 16px;
    margin-left: 12px;
  }

  #controls {
    background: #0d1220;
    border-bottom: 1px solid #1e2d44;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    z-index: 10;
    position: relative;
    flex-shrink: 0;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .control-label {
    font-size: 10px;
    color: #4a5a6a;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .view-toggle {
    display: flex;
    background: #131a2b;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #1e2d44;
  }

  .view-toggle button {
    background: transparent;
    border: none;
    color: #6a7a8a;
    padding: 6px 16px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .view-toggle button.active {
    background: #1e2d44;
    color: #c4a35a;
  }

  .view-toggle button:hover:not(.active) {
    color: #e8dcc8;
  }

  .category-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .cat-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid #1e2d44;
    background: #131a2b;
    color: #e8dcc8;
    transition: all 0.2s;
    user-select: none;
  }

  .cat-chip.hidden {
    opacity: 0.35;
    border-color: transparent;
  }

  .cat-chip .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .mc-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid #1e2d44;
    background: #131a2b;
    color: #6a7a8a;
    transition: all 0.2s;
    user-select: none;
  }

  .mc-toggle.active {
    border-color: #3a1e4a;
    color: #b87adb;
    background: #1a1228;
  }

  .mc-toggle .icon {
    font-size: 14px;
  }

  #matrix-container {
    flex: 1;
    overflow: auto;
    padding: 24px;
    position: relative;
  }

  #legend {
    background: #0d1220;
    border-top: 1px solid #1e2d44;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-shrink: 0;
    z-index: 10;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #6a7a8a;
  }

  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    border: 1px solid #1e2d44;
  }

  #stats-bar {
    background: #0d1220;
    border-top: 1px solid #1e2d44;
    padding: 8px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-shrink: 0;
    z-index: 10;
    font-size: 11px;
    color: #6a7a8a;
  }

  .stat-player {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-player .name {
    color: #7ba4c7;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .stat-player .pct {
    color: #c4a35a;
    font-weight: 500;
  }

  .stat-player .bar-bg {
    width: 60px;
    height: 4px;
    background: #131a2b;
    border-radius: 2px;
    overflow: hidden;
  }

  .stat-player .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    pointer-events: none;
    background: #0d1220;
    border: 1px solid #1e2d44;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 11px;
    line-height: 1.6;
    color: #e8dcc8;
    z-index: 100;
    max-width: 280px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .tooltip.visible {
    opacity: 1;
  }

  .tooltip .tt-player {
    color: #7ba4c7;
    font-weight: 500;
  }

  .tooltip .tt-archetype {
    color: #4a5a6a;
    font-size: 10px;
    margin-bottom: 4px;
  }

  .tooltip .tt-item {
    color: #c4a35a;
  }

  .tooltip .tt-state {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    margin-top: 2px;
  }

  .tooltip .tt-secret {
    margin-top: 6px;
    color: #b87adb;
    font-size: 10px;
    font-style: italic;
    border-top: 1px solid #2a1538;
    padding-top: 4px;
  }

  .tooltip .tt-hint {
    margin-top: 6px;
    color: #3a4a5a;
    font-size: 9px;
  }

  /* SVG styles */
  .category-header text {
    font-family: 'Crimson Text', serif;
    fill: #c4a35a;
    font-size: 13px;
    font-weight: 600;
  }

  .category-header rect {
    fill: #0d1220;
  }

  .row-label {
    font-family: 'JetBrains Mono', monospace;
    fill: #8a9aaa;
    font-size: 11px;
    cursor: pointer;
    transition: fill 0.2s;
  }

  .row-label:hover {
    fill: #e8dcc8;
  }

  .col-label {
    font-family: 'JetBrains Mono', monospace;
    fill: #7ba4c7;
    font-size: 11px;
    font-weight: 500;
  }

  .col-subtitle {
    font-family: 'JetBrains Mono', monospace;
    fill: #4a5a6a;
    font-size: 9px;
  }

  .cell {
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .cell:hover {
    opacity: 0.85;
    stroke: #e8dcc8;
    stroke-width: 1.5;
  }

  .summary-label {
    font-family: 'JetBrains Mono', monospace;
    fill: #4a5a6a;
    font-size: 10px;
    font-style: italic;
  }

  .summary-text {
    font-family: 'JetBrains Mono', monospace;
    fill: #c4a35a;
    font-size: 11px;
    font-weight: 500;
  }
</style>
</head>
<body>

<header>
  <h1>The Ceremony <span>Player x secrets revelation heatmap</span></h1>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="mc-toggle" id="mc-mode-toggle" onclick="toggleMcMode()">
      <span class="icon">&#9670;</span> MC Mode
    </div>
  </div>
</header>

<div id="controls">
  <div class="control-group">
    <span class="control-label">Filter</span>
    <div class="category-filters" id="category-filters"></div>
  </div>
  <div class="control-group">
    <span class="control-label">Sort rows</span>
    <div class="view-toggle" id="row-sort-toggle">
      <button class="active" data-sort="category" onclick="setRowSort('category')">Category</button>
      <button data-sort="revelation" onclick="setRowSort('revelation')">Revelation</button>
      <button data-sort="alpha" onclick="setRowSort('alpha')">A-Z</button>
    </div>
  </div>
  <div class="control-group">
    <span class="control-label">Sort cols</span>
    <div class="view-toggle" id="col-sort-toggle">
      <button class="active" data-sort="default" onclick="setColSort('default')">Default</button>
      <button data-sort="knowledge" onclick="setColSort('knowledge')">Knowledge</button>
      <button data-sort="alpha" onclick="setColSort('alpha')">A-Z</button>
    </div>
  </div>
</div>

<div id="matrix-container">
  <svg id="matrix-svg"></svg>
</div>

<div id="legend">
  <span class="control-label" style="margin-right:4px;">Legend</span>
  <div class="legend-item">
    <div class="legend-swatch" style="background:#131a2b;"></div>
    Unknown
  </div>
  <div class="legend-item">
    <div class="legend-swatch" style="background:#6b5a2a;"></div>
    Rumored / Partial
  </div>
  <div class="legend-item">
    <div class="legend-swatch" style="background:#c4a35a;"></div>
    Confirmed
  </div>
  <div class="legend-item" id="legend-secret" style="display:none;">
    <div class="legend-swatch" style="background:#3a1e4a;border-color:#5a3a6a;"></div>
    Secret (MC only)
  </div>
</div>

<div id="stats-bar"></div>

<div class="tooltip" id="tooltip"></div>

<div id="loading" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;color:#5a6a7a;letter-spacing:0.15em;text-transform:uppercase;z-index:100">Loading fog data...</div>
<div id="update-badge" style="position:fixed;top:12px;right:12px;padding:4px 12px;background:#1e2d44;border:1px solid #c4a35a44;border-radius:4px;font-size:10px;color:#c4a35a;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100">Data updated</div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────
const STATES = {
  unknown:   { label: 'Unknown',          color: '#131a2b', border: '#1e2d44', textColor: '#3a4a5a' },
  rumored:   { label: 'Rumored / Partial', color: '#6b5a2a', border: '#8a7a3a', textColor: '#c4a35a' },
  confirmed: { label: 'Confirmed',         color: '#c4a35a', border: '#d4b36a', textColor: '#0a0e17' },
  secret:    { label: 'Secret (MC only)',  color: '#3a1e4a', border: '#5a3a6a', textColor: '#b87adb' }
};

const STATE_CYCLE = ['unknown', 'rumored', 'confirmed'];

var players = [];
var categories = [
  { id: 'npcs',      label: 'NPCs Met',        color: '#6b9e7a' },
  { id: 'locations',  label: 'Locations Visited', color: '#7ba4c7' },
  { id: 'clues',      label: 'Clues & Secrets',  color: '#c4a35a' }
];
var knowledgeItems = [];

// ─── FALLBACK DATA ────────────────────────────────────────────────
function buildFallbackPlayers() {
  return [
    { id: 'harrow',  name: 'Dr. Elizabeth Harrow', archetype: 'The Scientist' },
    { id: 'walsh',   name: 'Sgt. Frank Walsh',     archetype: 'The Veteran' },
    { id: 'okafor',  name: 'Mara Okafor',          archetype: 'The Journalist' },
    { id: 'reed',    name: 'Thomas Reed',           archetype: 'The Mechanic' },
    { id: 'crane',   name: 'Isabelle Crane',        archetype: 'The Believer' }
  ];
}

function buildFallbackKnowledge() {
  return [
    { id: 'npc-starkweather', label: 'Dr. Harold Starkweather', category: 'npcs',
      states: { harrow: 'confirmed', walsh: 'confirmed', okafor: 'confirmed', reed: 'confirmed', crane: 'confirmed' } }
  ];
}

// ─── DATA LOADING ─────────────────────────────────────────────────
CeremonyData.load({ slice: 'fog' }).then(function(data) {
  // Transform API fog data to match the existing format
  if (data.fog && data.fog.length > 0) {
    players = data.fog.map(function(f) {
      return { id: f.playerId, name: f.playerName, archetype: '' };
    });

    // Build knowledge items from fog entries
    // Each unique knowledge key becomes a row
    var allKeys = new Set();
    data.fog.forEach(function(f) {
      Object.keys(f.knowledge || {}).forEach(function(k) { allKeys.add(k); });
    });

    knowledgeItems = Array.from(allKeys).map(function(key) {
      // Infer category from key prefix
      var category = 'clues';
      if (key.startsWith('npc-')) category = 'npcs';
      else if (key.startsWith('loc-')) category = 'locations';

      var states = {};
      data.fog.forEach(function(f) {
        states[f.playerId] = (f.knowledge || {})[key] || 'unknown';
      });

      return {
        id: key,
        label: key.replace(/^(npc-|loc-|clue-)/, '').replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); }),
        category: category,
        states: states
      };
    });
  }

  // If no data from API, use fallback data so the page isn't empty
  if (players.length === 0) {
    players = buildFallbackPlayers();
    knowledgeItems = buildFallbackKnowledge();
  }

  document.getElementById('loading').style.display = 'none';

  // ─── STATE ────────────────────────────────────────────────────────
  let mcMode = false;
  let rowSort = 'category';
  let colSort = 'default';
  let visibleCategories = new Set(categories.map(c => c.id));

  // Deep-copy item states so we can mutate via click
  const itemStates = {};
  knowledgeItems.forEach(item => {
    itemStates[item.id] = Object.assign({}, item.states);
  });

  // ─── LAYOUT CONSTANTS ─────────────────────────────────────────────
  const CELL_SIZE = 40;
  const CELL_PAD = 3;
  const CELL_RADIUS = 4;
  const ROW_LABEL_WIDTH = 220;
  const COL_HEADER_HEIGHT = 100;
  const CATEGORY_ROW_HEIGHT = 32;
  const SUMMARY_ROW_HEIGHT = 36;

  // ─── INIT ─────────────────────────────────────────────────────────
  const svg = d3.select('#matrix-svg');
  const tooltip = d3.select('#tooltip');

  buildCategoryFilters();
  render();

  // Expose interactive functions to global scope for HTML onclick handlers
  window.toggleMcMode = toggleMcMode;
  window.setRowSort = setRowSort;
  window.setColSort = setColSort;

// ─── RENDER ───────────────────────────────────────────────────────
function render() {
  const filteredItems = getFilteredSortedItems();
  const sortedPlayers = getSortedPlayers();

  // Calculate dimensions
  let totalRows = 0;
  let categoryCount = 0;
  const rowLayout = [];

  if (rowSort === 'category') {
    categories.forEach(function(cat) {
      if (!visibleCategories.has(cat.id)) return;
      const catItems = filteredItems.filter(function(it) { return it.category === cat.id; });
      if (catItems.length === 0) return;
      rowLayout.push({ type: 'category', data: cat, y: 0 });
      categoryCount++;
      catItems.forEach(function(item) {
        rowLayout.push({ type: 'item', data: item, y: 0 });
        totalRows++;
      });
    });
  } else {
    filteredItems.forEach(function(item) {
      rowLayout.push({ type: 'item', data: item, y: 0 });
      totalRows++;
    });
  }

  // Assign y positions
  let yPos = COL_HEADER_HEIGHT;
  rowLayout.forEach(function(row) {
    row.y = yPos;
    if (row.type === 'category') {
      yPos += CATEGORY_ROW_HEIGHT;
    } else {
      yPos += CELL_SIZE + CELL_PAD;
    }
  });

  const totalWidth = ROW_LABEL_WIDTH + sortedPlayers.length * (CELL_SIZE + CELL_PAD) + 40;
  const totalHeight = yPos + SUMMARY_ROW_HEIGHT + 20;

  svg.attr('width', totalWidth).attr('height', totalHeight);

  // Clear and redraw
  svg.selectAll('*').remove();

  const g = svg.append('g');

  // ─── Column headers ──────────────────────
  const colG = g.append('g').attr('class', 'col-headers');
  sortedPlayers.forEach(function(player, i) {
    const x = ROW_LABEL_WIDTH + i * (CELL_SIZE + CELL_PAD) + (CELL_SIZE / 2);
    const hg = colG.append('g')
      .attr('transform', 'translate(' + x + ', ' + (COL_HEADER_HEIGHT - 12) + ') rotate(-45)');

    hg.append('text')
      .attr('class', 'col-label')
      .attr('text-anchor', 'start')
      .attr('dy', '0.35em')
      .text(player.name.length > 20 ? player.name.slice(0, 18) + '..' : player.name);

    hg.append('text')
      .attr('class', 'col-subtitle')
      .attr('text-anchor', 'start')
      .attr('dy', '1.8em')
      .text(player.archetype);
  });

  // ─── Rows ──────────────────────────────────
  const rowG = g.append('g').attr('class', 'rows');

  rowLayout.forEach(function(row) {
    if (row.type === 'category') {
      // Category header row
      const cg = rowG.append('g')
        .attr('class', 'category-header')
        .attr('transform', 'translate(0, ' + row.y + ')');

      const catColor = row.data.color;
      cg.append('rect')
        .attr('x', 0)
        .attr('y', 0)
        .attr('width', totalWidth)
        .attr('height', CATEGORY_ROW_HEIGHT)
        .attr('fill', '#0d1220')
        .attr('opacity', 0.7);

      cg.append('line')
        .attr('x1', 12).attr('x2', totalWidth - 12)
        .attr('y1', CATEGORY_ROW_HEIGHT - 1).attr('y2', CATEGORY_ROW_HEIGHT - 1)
        .attr('stroke', catColor).attr('stroke-opacity', 0.3);

      cg.append('text')
        .attr('x', 16)
        .attr('y', CATEGORY_ROW_HEIGHT / 2)
        .attr('dy', '0.35em')
        .attr('fill', catColor)
        .text(row.data.label);

      // Category item count
      var catItemCount = knowledgeItems.filter(function(it) { return it.category === row.data.id; }).length;
      cg.append('text')
        .attr('x', 16 + row.data.label.length * 8 + 16)
        .attr('y', CATEGORY_ROW_HEIGHT / 2)
        .attr('dy', '0.35em')
        .attr('fill', '#4a5a6a')
        .attr('font-size', '10px')
        .text('(' + catItemCount + ')');

    } else {
      // Item row
      var item = row.data;
      var ig = rowG.append('g')
        .attr('class', 'item-row')
        .attr('transform', 'translate(0, ' + row.y + ')');

      // Row label
      var catColor = '#6a7a8a';
      for (var ci = 0; ci < categories.length; ci++) {
        if (categories[ci].id === item.category) { catColor = categories[ci].color; break; }
      }

      // Category dot
      ig.append('circle')
        .attr('cx', 16)
        .attr('cy', CELL_SIZE / 2)
        .attr('r', 3)
        .attr('fill', catColor)
        .attr('opacity', 0.6);

      ig.append('text')
        .attr('class', 'row-label')
        .attr('x', 28)
        .attr('y', CELL_SIZE / 2)
        .attr('dy', '0.35em')
        .text(item.label.length > 26 ? item.label.slice(0, 24) + '..' : item.label)
        .on('click', (function(itemId) { return function() { sortByRow(itemId); }; })(item.id));

      // Secret indicator (only in MC mode)
      if (mcMode && item.secret) {
        ig.append('text')
          .attr('x', ROW_LABEL_WIDTH - 16)
          .attr('y', CELL_SIZE / 2)
          .attr('dy', '0.35em')
          .attr('text-anchor', 'end')
          .attr('fill', '#b87adb')
          .attr('font-size', '12px')
          .attr('opacity', 0.7)
          .text('\u2666');
      }

      // Cells
      sortedPlayers.forEach(function(player, pi) {
        var state = itemStates[item.id][player.id];
        var isSecret = item.secret && state === 'unknown' && mcMode;
        var stateInfo = isSecret ? STATES.secret : STATES[state];
        var cx = ROW_LABEL_WIDTH + pi * (CELL_SIZE + CELL_PAD);

        var cell = ig.append('rect')
          .attr('class', 'cell')
          .attr('x', cx)
          .attr('y', 0)
          .attr('width', CELL_SIZE)
          .attr('height', CELL_SIZE)
          .attr('rx', CELL_RADIUS)
          .attr('ry', CELL_RADIUS)
          .attr('fill', stateInfo.color)
          .attr('stroke', stateInfo.border)
          .attr('stroke-width', 0.5);

        // State indicator inside cell
        if (state === 'confirmed') {
          ig.append('text')
            .attr('x', cx + CELL_SIZE / 2)
            .attr('y', CELL_SIZE / 2)
            .attr('dy', '0.35em')
            .attr('text-anchor', 'middle')
            .attr('fill', stateInfo.textColor)
            .attr('font-size', '14px')
            .attr('font-weight', '500')
            .attr('pointer-events', 'none')
            .text('\u2713');
        } else if (state === 'rumored') {
          ig.append('text')
            .attr('x', cx + CELL_SIZE / 2)
            .attr('y', CELL_SIZE / 2)
            .attr('dy', '0.35em')
            .attr('text-anchor', 'middle')
            .attr('fill', stateInfo.textColor)
            .attr('font-size', '11px')
            .attr('pointer-events', 'none')
            .text('?');
        } else if (isSecret) {
          ig.append('text')
            .attr('x', cx + CELL_SIZE / 2)
            .attr('y', CELL_SIZE / 2)
            .attr('dy', '0.35em')
            .attr('text-anchor', 'middle')
            .attr('fill', stateInfo.textColor)
            .attr('font-size', '11px')
            .attr('pointer-events', 'none')
            .attr('opacity', 0.6)
            .text('\u2666');
        }

        // Interactions — use closures to capture values
        (function(p, it, st, sec) {
          cell
            .on('mouseover', function(event) { showTooltip(event, p, it, st, sec); })
            .on('mousemove', function(event) { moveTooltip(event); })
            .on('mouseout', hideTooltip)
            .on('click', function() { cycleState(it.id, p.id); });
        })(player, item, state, isSecret);
      });
    }
  });

  // ─── Summary row ──────────────────────────
  var summaryY = yPos + 4;
  var summG = g.append('g').attr('class', 'summary-row')
    .attr('transform', 'translate(0, ' + summaryY + ')');

  // Divider line
  summG.append('line')
    .attr('x1', ROW_LABEL_WIDTH - 8).attr('x2', totalWidth - 12)
    .attr('y1', 0).attr('y2', 0)
    .attr('stroke', '#1e2d44');

  summG.append('text')
    .attr('class', 'summary-label')
    .attr('x', 28)
    .attr('y', SUMMARY_ROW_HEIGHT / 2)
    .attr('dy', '0.35em')
    .text('% revealed');

  sortedPlayers.forEach(function(player, pi) {
    var pct = getPlayerRevelation(player.id, filteredItems);
    var cx = ROW_LABEL_WIDTH + pi * (CELL_SIZE + CELL_PAD);

    summG.append('text')
      .attr('class', 'summary-text')
      .attr('x', cx + CELL_SIZE / 2)
      .attr('y', SUMMARY_ROW_HEIGHT / 2)
      .attr('dy', '0.35em')
      .attr('text-anchor', 'middle')
      .text(Math.round(pct) + '%');
  });

  // ─── Stats bar ────────────────────────────
  updateStatsBar(sortedPlayers, filteredItems);
}

// ─── SORTING / FILTERING ─────────────────────────────────────────
function getFilteredSortedItems() {
  var items = knowledgeItems.filter(function(it) { return visibleCategories.has(it.category); });

  if (rowSort === 'revelation') {
    items = items.slice().sort(function(a, b) {
      return getTotalRevelation(b.id) - getTotalRevelation(a.id);
    });
  } else if (rowSort === 'alpha') {
    items = items.slice().sort(function(a, b) { return a.label.localeCompare(b.label); });
  }

  return items;
}

function getSortedPlayers() {
  if (colSort.indexOf('row-') === 0) {
    var itemId = colSort.replace('row-', '');
    return players.slice().sort(function(a, b) {
      var scoreMap = { confirmed: 2, rumored: 1, unknown: 0 };
      return (scoreMap[itemStates[itemId][b.id]] || 0) - (scoreMap[itemStates[itemId][a.id]] || 0);
    });
  }
  var p = players.slice();
  if (colSort === 'knowledge') {
    p.sort(function(a, b) { return getPlayerTotalKnowledge(b.id) - getPlayerTotalKnowledge(a.id); });
  } else if (colSort === 'alpha') {
    p.sort(function(a, b) { return a.name.localeCompare(b.name); });
  }
  return p;
}

function getTotalRevelation(itemId) {
  var states = itemStates[itemId];
  var score = 0;
  var keys = Object.keys(states);
  for (var i = 0; i < keys.length; i++) {
    if (states[keys[i]] === 'confirmed') score += 2;
    else if (states[keys[i]] === 'rumored') score += 1;
  }
  return score;
}

function getPlayerTotalKnowledge(playerId) {
  var score = 0;
  knowledgeItems.forEach(function(item) {
    if (!visibleCategories.has(item.category)) return;
    var s = itemStates[item.id][playerId];
    if (s === 'confirmed') score += 2;
    else if (s === 'rumored') score += 1;
  });
  return score;
}

function getPlayerRevelation(playerId, filteredItems) {
  if (filteredItems.length === 0) return 0;
  var known = 0;
  filteredItems.forEach(function(item) {
    var s = itemStates[item.id][playerId];
    if (s === 'confirmed') known += 1;
    else if (s === 'rumored') known += 0.5;
  });
  return (known / filteredItems.length) * 100;
}

function getPlayerStateCounts(playerId, filteredItems) {
  var confirmed = 0, rumored = 0, unknown = 0;
  filteredItems.forEach(function(item) {
    var s = itemStates[item.id][playerId];
    if (s === 'confirmed') confirmed++;
    else if (s === 'rumored') rumored++;
    else unknown++;
  });
  return { confirmed: confirmed, rumored: rumored, unknown: unknown };
}

// ─── INTERACTIONS ─────────────────────────────────────────────────
function cycleState(itemId, playerId) {
  var current = itemStates[itemId][playerId];
  var idx = STATE_CYCLE.indexOf(current);
  var next = STATE_CYCLE[(idx + 1) % STATE_CYCLE.length];
  itemStates[itemId][playerId] = next;
  render();
}

function sortByRow(itemId) {
  if (colSort === 'row-' + itemId) {
    colSort = 'default';
  } else {
    colSort = 'row-' + itemId;
  }
  // Deactivate column sort buttons since we have a custom sort
  document.querySelectorAll('#col-sort-toggle button').forEach(function(btn) {
    btn.classList.remove('active');
  });
  if (colSort === 'default') {
    document.querySelector('#col-sort-toggle button[data-sort="default"]').classList.add('active');
  }
  render();
}

function toggleMcMode() {
  mcMode = !mcMode;
  var toggle = document.getElementById('mc-mode-toggle');
  if (mcMode) {
    toggle.classList.add('active');
  } else {
    toggle.classList.remove('active');
  }
  document.getElementById('legend-secret').style.display = mcMode ? 'flex' : 'none';
  render();
}

function setRowSort(sort) {
  rowSort = sort;
  document.querySelectorAll('#row-sort-toggle button').forEach(function(btn) {
    if (btn.dataset.sort === sort) { btn.classList.add('active'); }
    else { btn.classList.remove('active'); }
  });
  render();
}

function setColSort(sort) {
  colSort = sort;
  document.querySelectorAll('#col-sort-toggle button').forEach(function(btn) {
    if (btn.dataset.sort === sort) { btn.classList.add('active'); }
    else { btn.classList.remove('active'); }
  });
  render();
}

function toggleCategory(catId) {
  if (visibleCategories.has(catId)) {
    if (visibleCategories.size <= 1) return;
    visibleCategories.delete(catId);
  } else {
    visibleCategories.add(catId);
  }
  document.querySelectorAll('.cat-chip').forEach(function(chip) {
    if (visibleCategories.has(chip.dataset.cat)) {
      chip.classList.remove('hidden');
    } else {
      chip.classList.add('hidden');
    }
  });
  render();
}

// ─── TOOLTIP ──────────────────────────────────────────────────────
function showTooltip(event, player, item, state, isSecret) {
  var stateInfo = isSecret ? STATES.secret : STATES[state];
  var stateBg = isSecret ? '#2a1538' : (state === 'confirmed' ? '#2a2210' : state === 'rumored' ? '#1a1810' : '#0d1220');
  var stateTextColor = stateInfo.textColor === '#0a0e17' ? '#c4a35a' : stateInfo.textColor;

  var tt = document.getElementById('tooltip');
  // Clear tooltip content
  while (tt.firstChild) { tt.removeChild(tt.firstChild); }

  // Player name
  var playerDiv = document.createElement('div');
  playerDiv.className = 'tt-player';
  playerDiv.textContent = player.name;
  tt.appendChild(playerDiv);

  // Archetype
  var archDiv = document.createElement('div');
  archDiv.className = 'tt-archetype';
  archDiv.textContent = player.archetype;
  tt.appendChild(archDiv);

  // Item name
  var itemDiv = document.createElement('div');
  itemDiv.className = 'tt-item';
  itemDiv.textContent = item.label;
  tt.appendChild(itemDiv);

  // State badge
  var stateSpan = document.createElement('div');
  stateSpan.className = 'tt-state';
  stateSpan.textContent = stateInfo.label;
  stateSpan.style.background = stateBg;
  stateSpan.style.color = stateTextColor;
  stateSpan.style.border = '1px solid ' + stateInfo.border;
  tt.appendChild(stateSpan);

  // Secret note (MC mode only)
  if (mcMode && item.secret) {
    var secretDiv = document.createElement('div');
    secretDiv.className = 'tt-secret';
    secretDiv.textContent = item.secret;
    tt.appendChild(secretDiv);
  }

  // Click hint
  var hintDiv = document.createElement('div');
  hintDiv.className = 'tt-hint';
  hintDiv.textContent = 'Click to cycle state';
  tt.appendChild(hintDiv);

  tooltip.classed('visible', true);
  moveTooltip(event);
}

function moveTooltip(event) {
  var tt = tooltip.node();
  var ttRect = tt.getBoundingClientRect();
  var x = event.clientX + 14;
  var y = event.clientY - 10;

  if (x + ttRect.width > window.innerWidth - 10) x = event.clientX - ttRect.width - 14;
  if (y + ttRect.height > window.innerHeight - 10) y = event.clientY - ttRect.height + 10;
  if (y < 10) y = 10;

  tooltip.style('left', x + 'px').style('top', y + 'px');
}

function hideTooltip() {
  tooltip.classed('visible', false);
}

// ─── CATEGORY FILTER CHIPS ────────────────────────────────────────
function buildCategoryFilters() {
  var container = document.getElementById('category-filters');
  categories.forEach(function(cat) {
    var chip = document.createElement('div');
    chip.className = 'cat-chip';
    chip.dataset.cat = cat.id;

    var dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.background = cat.color;
    chip.appendChild(dot);

    chip.appendChild(document.createTextNode(cat.label));

    chip.onclick = function() { toggleCategory(cat.id); };
    container.appendChild(chip);
  });
}

// ─── STATS BAR ────────────────────────────────────────────────────
function updateStatsBar(sortedPlayers, filteredItems) {
  var bar = document.getElementById('stats-bar');
  while (bar.firstChild) { bar.removeChild(bar.firstChild); }

  sortedPlayers.forEach(function(player) {
    var counts = getPlayerStateCounts(player.id, filteredItems);
    var total = filteredItems.length;
    var pct = total > 0 ? Math.round(((counts.confirmed + counts.rumored * 0.5) / total) * 100) : 0;

    var div = document.createElement('div');
    div.className = 'stat-player';

    var nameSpan = document.createElement('span');
    nameSpan.className = 'name';
    nameSpan.textContent = player.name.split(' ').pop();
    div.appendChild(nameSpan);

    var pctSpan = document.createElement('span');
    pctSpan.className = 'pct';
    pctSpan.textContent = pct + '%';
    div.appendChild(pctSpan);

    var barBg = document.createElement('div');
    barBg.className = 'bar-bg';
    var barFill = document.createElement('div');
    barFill.className = 'bar-fill';
    barFill.style.width = pct + '%';
    barFill.style.background = 'linear-gradient(90deg, #6b5a2a ' + (counts.rumored > 0 ? '30%' : '0%') + ', #c4a35a)';
    barBg.appendChild(barFill);
    div.appendChild(barBg);

    var countSpan = document.createElement('span');
    countSpan.style.color = '#4a5a6a';
    countSpan.style.fontSize = '10px';
    countSpan.textContent = counts.confirmed + '/' + counts.rumored + '/' + counts.unknown;
    div.appendChild(countSpan);

    bar.appendChild(div);
  });

  // Total fog summary
  var totalDiv = document.createElement('div');
  totalDiv.className = 'stat-player';
  totalDiv.style.marginLeft = 'auto';

  var totalKnown = sortedPlayers.reduce(function(sum, p) {
    var c = getPlayerStateCounts(p.id, filteredItems);
    return sum + c.confirmed + c.rumored * 0.5;
  }, 0);
  var totalPossible = filteredItems.length * sortedPlayers.length;
  var totalPct = totalPossible > 0 ? Math.round((totalKnown / totalPossible) * 100) : 0;

  var fogLabel = document.createElement('span');
  fogLabel.style.color = '#6a7a8a';
  fogLabel.textContent = 'Total fog:';
  totalDiv.appendChild(fogLabel);

  var fogValue = document.createElement('span');
  fogValue.style.fontWeight = '500';
  fogValue.style.color = totalPct < 30 ? '#7ba4c7' : totalPct < 60 ? '#c4a35a' : '#6b9e7a';
  fogValue.textContent = (100 - totalPct) + '% hidden';
  totalDiv.appendChild(fogValue);

  bar.appendChild(totalDiv);
}

  // ─── LIVE UPDATE SUBSCRIPTION ───────────────────────────────────
  CeremonyData.subscribe(function(data) {
    if (data.fog && data.fog.length > 0) {
      // Update knowledge states from new data
      data.fog.forEach(function(f) {
        Object.keys(f.knowledge || {}).forEach(function(key) {
          if (typeof itemStates !== 'undefined' && itemStates[key]) {
            itemStates[key][f.playerId] = f.knowledge[key];
          }
        });
      });
      if (typeof render === 'function') render();
    }
    // Flash update badge
    var badge = document.getElementById('update-badge');
    if (badge) {
      badge.style.opacity = '1';
      setTimeout(function() { badge.style.opacity = '0'; }, 2000);
    }
  });

}); // end CeremonyData.load().then()
</script>
